<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOUT | scaL_TONE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #ffffff; 
            color: #111111; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 40px 20px 100px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            position: relative;
        }
        
        /* 1. 左端にメニューボタンを固定したため、右端の現在地表示を担保するヘッダー */
        header { 
            max-width: 1200px; 
            margin: 0 auto 80px; 
            display: flex; 
            justify-content: flex-end; /* 右端のみに寄せて美しく対比させる */
            align-items: center;
            width: 100%;
            z-index: 100;
        }
        
        .current-page { 
            font-size: 10px; 
            letter-spacing: 0.2em; 
            font-weight: 700; 
            border-bottom: 1px solid #111111; 
            padding-bottom: 4px; 
            text-transform: uppercase;
        }

        /* */
        /* 
           【極上レスポンシブ固定（追従）メニューボタン】
           スクロールしても左上に追従。
           画面最大幅1200pxの左端にピタリとシンクロし、スマホ等では端から20pxの美しい位置をキープ。
        */
        .menu-trigger {
            position: fixed;
            top: 40px;
            left: max(20px, calc(50% - 600px));
            background: none;
            border: none;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1100; /* サイドバーよりも手前に表示 */
        }

        .menu-trigger img {
            position: absolute;
            width: 26px;
            height: auto;
            object-fit: contain;
            /* 物理的な弾力性を感じるイージング (cubic-bezier) により、滑らかなモーフィング（変形）を表現 */
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 
           初期状態: menu1.png (三本バー) がアクティブに直立。
           menu2.png (テトラポット) は、中央の1点に極小に縮まり、回転した状態で裏で待機。
        */
        .menu-trigger .icon-default {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        .menu-trigger .icon-active {
            opacity: 0;
            transform: scale(0.1) rotate(-120deg);
        }

        /* 
           変形・モーフィング状態: 
           menu1.png (三本バー) は中央に向かってギュッと極細に圧縮されつつ、回転しながら消滅。
           menu2.png (テトラポット) は、その結合点から3方向の爪が飛び出すようにバネ的に拡大しながら回転して出現。
        */
        .menu-trigger.active .icon-default {
            opacity: 0;
            transform: scaleX(0.1) scaleY(0.3) rotate(90deg);
        }

        .menu-trigger.active .icon-active {
            opacity: 1;
            transform: scale(1) rotate(0deg);
        }

        /* */
        /* 15〜20%の割合を占めるスライドイン・サイドバー（MENU-02.pngの完全再現） */
        .sidebar-menu {
            position: fixed;
            top: 0;
            left: -260px; /* 初期状態は画面外に隠蔽 */
            width: 240px;
            height: 100vh;
            background-color: #eaeaea; /* カンプ通りのマットなライトグレー */
            z-index: 1000;
            padding: 120px 30px 40px; /* 上部にテトラポットボタンの余白を担保 */
            display: flex;
            flex-direction: column;
            gap: 28px;
            transition: left 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.02);
        }

        .sidebar-menu.open {
            left: 0; /* 滑らかに出現 */
        }

        /* サイドバー最上部のブランドマーク (menu2.pngをシンボル表示) */
        .sidebar-logo {
            margin-bottom: 12px;
            display: flex;
            justify-content: flex-start;
        }

        .sidebar-logo img {
            width: 32px;
            height: auto;
            object-fit: contain;
        }

        /* サイドバー内のリンク構造 */
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #111111;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 6px 0;
            position: relative;
        }

        /* 
           【文字左側整列のための固定幅ラッパー】
           HOME(22px)が収まる24pxの固定幅エリアを作り、すべての中央にアイコンを配置することで、
           右側に続く「文字の左側」が完璧な縦一列にアライン（整列）します。
        */
        .sidebar-icon-wrapper {
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 12px; /* アイコンとテキストの均一なギャップ */
        }

        /* 指定された画像ファイルを呼び出すサイドバーアイコン用スタイル */
        .sidebar-icon {
            max-width: 16px;
            max-height: 16px;
            width: 100%;
            height: auto;
            object-fit: contain;
            opacity: 0.9;
            transition: transform 0.4s ease;
        }

        .sidebar-item:hover .sidebar-icon {
            transform: scale(1.1);
        }

        /* 【特注】HOMEアイコンのみ、お預かりしているサイズ感を活かすためにwrapper内で最大22pxまで拡張 */
        .sidebar-item.home-link .sidebar-icon {
            max-width: 22px;
            max-height: 22px;
        }

        /* 
           【統一された細線アンダーバーのホバー効果】
           開始位置（left: 36px）は、wrapper(24px) + margin(12px) の位置に完全に固定。
           全てのメニューでバーの細さ(1px)と長さ(20px ⇄ 44px)をミリ単位で完全統一しました。
        */
        .sidebar-item::after {
            content: '';
            position: absolute;
            left: 36px;
            bottom: 0;
            width: 20px; /* 通常時の長さ */
            height: 1px; /* 統一された極細ライン */
            background-color: #111111;
            transition: width 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .sidebar-item:hover::after {
            width: 44px; /* ホバー時にスッと伸びる長さ */
        }

        /* アクティブなページ（ABOUT）の識別マークも統一 */
        .sidebar-item.active-link::after {
            width: 44px; /* 最初から伸ばしておく */
            background-color: #111111;
        }

        /* 背景のソフトな暗幕（メインコンテンツに集中させるための薄いレイヤー） */
        .menu-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(2px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .menu-backdrop.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* */
        /* 2. 3カラムグリッドコンテナ */
        .about-container { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 20px; 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 45px 0; 
            border-top: 1px solid #eeeeee; 
            width: 100%;
            opacity: 0;
            animation: fadeInPage 1.2s ease-out forwards;
            align-items: center; /* 縦方向の位置をテキストの高さに揃える（中央揃え） */
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        /* 左カラム：セクションラベル */
        .about-label { 
            grid-column: 1 / 3; 
            font-size: 10px; 
            letter-spacing: 0.1em; 
            color: #888888; 
            text-transform: uppercase; 
            font-weight: 500;
            align-self: start; /* ラベルだけは上部で固定 */
        }
        
        /* 中央カラム：ブランド紹介・テキストコンテンツ */
        .about-content { 
            grid-column: 3 / 8; 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
        }
        
        .brand-name {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: #111111;
        }

        .about-text {
            font-size: 14px;
            line-height: 2.0;
            letter-spacing: 0.05em;
            color: #333333;
        }

        /* 右カラム：ブランドイメージ画像エリア（カンプのS型幾何学シンボルと調和） */
        .about-image {
            grid-column: 8 / 13;
            overflow: hidden;
            display: flex;
            align-items: center; 
            justify-content: center;
            max-height: 280px; 
        }

        .about-image img {
            width: 100%;
            height: 100%;
            max-height: 280px; 
            object-fit: contain; 
            display: block;
            filter: grayscale(100%); 
            transition: filter 0.5s ease;
        }

        .about-image img:hover {
            filter: grayscale(0%);
        }
        
        /* 3. 最下部のBack to home（他ページと完全統一） */
        footer {
            margin-top: 100px;
            text-align: center;
            width: 100%;
            z-index: 10;
        }

        .back-link {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: #111111;
            text-decoration: none;
            border-bottom: 1px solid #111111;
            padding-bottom: 4px;
            transition: opacity 0.3s ease;
            text-transform: uppercase;
        }
        
        .back-link:hover {
            opacity: 0.5;
        }
        
        /* モバイル対応（3カラムを縦並びに） */
        @media (max-width: 768px) { 
            .about-container { 
                display: flex; 
                flex-direction: column; 
                gap: 30px;
            } 
            .about-label {
                margin-bottom: 10px;
            }
            .about-image {
                margin-top: 20px;
                order: -1; /* スマホ表示では画像がテキストの上に来るように */
                max-height: none;
            }
            .about-image img {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>

    <!-- 背景のソフトな暗幕 -->
    <div class="menu-backdrop" id="menu-backdrop"></div>

    <!-- ヘッダー：右上に現在地表示（メニューボタンはfixed化して画面追従） -->
    <header>
        <!-- menu1.png ⇄ menu2.png プレミアム変形・弾性モーフィングメニューボタン -->
        <button class="menu-trigger" id="menu-trigger" aria-label="Menu">
            <img src="/assets/menu1.png" alt="Open Menu" class="menu-icon icon-default" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=M1';">
            <img src="/assets/menu2.png" alt="Close Menu" class="menu-icon icon-active" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=M2';">
        </button>

        <div class="current-page">ABOUT</div>
    </header>

    <!-- -->
    <!-- スライドインするライトグレーサイドバー（MENU-02.pngの完全再現） -->
    <aside class="sidebar-menu" id="sidebar-menu">
        <!-- サイドバー最上部にテトラポットシンボルを美しく配置 -->
        <div class="sidebar-logo">
            <img src="/assets/menu2.png" alt="scaL_TONE Symbol" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=Y';">
        </div>
        <nav class="sidebar-nav">
            
            <!-- HOME (特注：home-linkクラスを追加してアイコンを大きめに調整。Wrapperによりテキストの開始位置は完璧に揃います) -->
            <a href="index.html" class="sidebar-item home-link">
                <span class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="/assets/logo3.png" onerror="this.src='https://placehold.co/22x22/111111/ffffff?text=H';" alt="">
                </span>
                HOME
            </a>
            <!-- ABOUT (Active) -->
            <a href="about.html" class="sidebar-item active-link">
                <span class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="/assets/about2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=A';" alt="">
                </span>
                ABOUT
            </a>
            <!-- SHOP -->
            <a href="shop.html" class="sidebar-item">
                <span class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="/assets/shop2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=S';" alt="">
                </span>
                SHOP
            </a>
            <!-- NEWS -->
            <a href="news.html" class="sidebar-item">
                <span class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="/assets/news2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=N';" alt="">
                </span>
                NEWS
            </a>
            <!-- WORKS -->
            <a href="works.html" class="sidebar-item">
                <span class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="/assets/work2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=W';" alt="">
                </span>
                WORKS
            </a>
            <!-- CONTACT -->
            <a href="contact.html" class="sidebar-item">
                <span class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="/assets/contact2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=C';" alt="">
                </span>
                CONTACT
            </a>
        </nav>
    </aside>

    <!-- メインコンテンツ：3カラム構造 -->
    <main>
        <div class="about-container" id="main-content">
            <!-- 左カラム -->
            <div class="about-label">Concept</div>
            
            <!-- 中央カラム -->
            <div class="about-content">
                <h2 class="brand-name">scaL_TONE</h2>
                <p class="about-text">
                    Scal_tone ｜ スケルトン<br>
                    建築、インテリア、ファッション。<br>
                    人の営みを包み込むあらゆる「Scale」を、<br>
                    様々な「Tone」で描き出すデザインブランド。<br>
                </p>
            </div>

            <!-- 右カラム -->
            <div class="about-image">
                <img src="/assets/logo2.png" alt="scaL_TONE Visual" onerror="this.src='https://placehold.co/280x280/eaeaea/111111?text=scaL_TONE';">
            </div>
        </div>
    </main>

    <!-- フッター -->
    <footer>
        <a href="index.html" class="back-link">Back to home</a>
    </footer>

    <!-- -->
    <!-- メニュー開閉用JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const trigger = document.getElementById('menu-trigger');
            const menu = document.getElementById('sidebar-menu');
            const backdrop = document.getElementById('menu-backdrop');
            const mainContent = document.getElementById('main-content');

            // メニュー展開時のトグル処理
            function toggleMenu() {
                const isOpen = menu.classList.toggle('open');
                trigger.classList.toggle('active');
                backdrop.classList.toggle('show');

                // メニューが展開されたらメインエリアを少し右側にシフトさせて緊張感を演出（MENU-02.pngの構造の再現）
                if (isOpen) {
                    document.body.style.overflow = 'hidden'; // 背景スクロール禁止
                    if (window.innerWidth > 768) {
                        mainContent.style.transform = 'translateX(60px)';
                    }
                } else {
                    document.body.style.overflow = '';
                    mainContent.style.transform = 'translateX(0)';
                }
            }

            // クリックイベントの登録
            trigger.addEventListener('click', toggleMenu);
            backdrop.addEventListener('click', toggleMenu);

            // メニュー展開時のリンククリック時にフェードアウトをかける処理
            const links = document.querySelectorAll('.sidebar-item');
            links.forEach(link => {
                link.addEventListener('click', function(e) {
                    const targetUrl = this.getAttribute('href');
                    if (targetUrl && targetUrl !== '#') {
                        e.preventDefault();
                        
                        // サイドバーを引っ込めて暗幕を解除
                        menu.classList.remove('open');
                        trigger.classList.remove('active');
                        backdrop.classList.remove('show');
                        mainContent.style.transform = 'translateX(0)';
                        
                        // 優雅なフェードアウトの後に遷移
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 500); 
                    }
                });
            });
        });
    </script>
</body>
</html>
