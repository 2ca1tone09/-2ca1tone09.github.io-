<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOUT | scaL_TONE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #ffffff; 
            color: #111111; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 40px 20px 100px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        /* 1. 右上のページ表示（他ページと完全統一） */
        header { 
            max-width: 1200px; 
            margin: 0 auto 80px; 
            display: flex; 
            justify-content: flex-end; 
            width: 100%;
        }
        
        .current-page { 
            font-size: 10px; 
            letter-spacing: 0.2em; 
            font-weight: 700; 
            border-bottom: 1px solid #111111; 
            padding-bottom: 4px; 
            text-transform: uppercase;
        }
        
        /* 2. 3カラムグリッドコンテナ */
        .about-container { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 20px; 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 45px 0; 
            border-top: 1px solid #eeeeee; 
            width: 100%;
            opacity: 0;
            animation: fadeInPage 1.2s ease-out forwards;
            align-items: center; /* 縦方向の位置をテキストの高さに揃える（中央揃え） */
        }
        
        /* 左カラム：セクションラベル */
        .about-label { 
            grid-column: 1 / 3; 
            font-size: 10px; 
            letter-spacing: 0.1em; 
            color: #888888; 
            text-transform: uppercase; 
            font-weight: 500;
            align-self: start; /* ラベルだけは上部で固定します */
        }
        
        /* 中央カラム：ブランド紹介・テキストコンテンツ */
        .about-content { 
            grid-column: 3 / 8; 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
        }
        
        .brand-name {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: #111111;
        }

        .about-text {
            font-size: 14px;
            line-height: 2.0;
            letter-spacing: 0.05em;
            color: #333333;
        }

        /* 右カラム：ブランドイメージ画像エリア */
        .about-image {
            grid-column: 8 / 13;
            overflow: hidden;
            display: flex;
            align-items: center; /* 内部の画像位置をテキストと同じ中央揃えに */
            justify-content: center;
            max-height: 280px; /* テキスト全体の高さに合わせるための最大の高さ制限 */
        }

        .about-image img {
            width: 100%;
            height: 100%;
            max-height: 280px; /* 画像がはみ出さないように制限 */
            object-fit: contain; /* 横縦比率を美しく保ったまま枠に合わせる */
            display: block;
            filter: grayscale(100%); 
            transition: filter 0.5s ease;
        }

        .about-image img:hover {
            filter: grayscale(0%);
        }
        
        /* 3. 最下部のBack to home（他ページと完全統一） */
        footer {
            margin-top: 100px;
            text-align: center;
            width: 100%;
        }

        .back-link {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: #111111;
            text-decoration: none;
            border-bottom: 1px solid #111111;
            padding-bottom: 4px;
            transition: opacity 0.3s ease;
            text-transform: uppercase;
        }
        
        .back-link:hover {
            opacity: 0.5;
        }
        
        /* フェードインアニメーション */
        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* モバイル対応（3カラムを縦並びに） */
        @media (max-width: 768px) { 
            .about-container { 
                display: flex; 
                flex-direction: column; 
                gap: 30px;
            } 
            .about-label {
                margin-bottom: 10px;
            }
            .about-image {
                margin-top: 20px;
                order: -1; /* スマホ表示では画像がテキストの上に来るように */
                max-height: none;
            }
            .about-image img {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="current-page">ABOUT</div>
    </header>

    <main>
        <div class="about-container">
            <div class="about-label">Concept</div>
            
            <div class="about-content">
                <h2 class="brand-name">scaL_TONE</h2>
                <p class="about-text">
                    Scal_tone ｜ スケルトン<br>
                    建築、インテリア、ファッション。<br>
                    人の営みを包み込むあらゆる「Scale」を、<br>
                    様々な「Tone」で描き出すデザインブランド。<br>
                </p>
            </div>

            <div class="about-image">
                <img src="/assets/about_main.png" alt="scaL_TONE Visual" onerror="this.style.display='none';">
            </div>
        </div>
    </main>

    <footer>
        <a href="index.html" class="back-link">Back to home</a>
    </footer>

</body>
</html>
