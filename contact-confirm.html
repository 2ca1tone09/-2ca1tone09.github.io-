<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONFIRM | scaL_TONE</title>
    <style>
        /* スタイルはcontact.htmlと同じため省略気味に記述 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #ffffff; color: #111111; font-family: sans-serif; padding: 40px 20px 100px; }
        header { max-width: 1200px; margin: 0 auto 80px; display: flex; justify-content: flex-end; }
        .current-page { font-size: 10px; letter-spacing: 0.2em; border-bottom: 1px solid #111; padding-bottom: 4px; }
        .contact-container { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; padding: 45px 0; border-top: 1px solid #eeeeee; }
        .contact-label { grid-column: 1 / 3; font-size: 10px; color: #888; }
        .contact-content { grid-column: 3 / 8; display: flex; flex-direction: column; gap: 30px; }
        .confirm-val { font-size: 14px; line-height: 1.8; color: #333; margin-bottom: 20px; }
        .btn { display: inline-block; font-size: 11px; border-bottom: 1px solid #111; padding-bottom: 4px; cursor: pointer; text-transform: uppercase; border: none; background: none; margin-right: 20px; }
    </style>
</head>
<body>
    <header><div class="current-page">CONTACT</div></header>
    <main>
        <form action="https://formspree.io/f/xrenekng" method="POST" class="contact-container">
            <div class="contact-label">Confirm</div>
            <div class="contact-content">
                <div id="display-area"></div>
                <input type="hidden" name="type" id="hidden-type">
                <input type="hidden" name="name" id="hidden-name">
                <input type="hidden" name="email" id="hidden-email">
                <input type="hidden" name="message" id="hidden-message">
                <input type="hidden" name="_next" value="https://scaltone.com/contact-complete.html">
                
                <div>
                    <button type="button" class="btn" onclick="history.back()" style="color:#888; border-color:#888;">BACK</button>
                    <button type="submit" class="btn">SUBMIT / 送信</button>
                </div>
            </div>
        </form>
    </main>
    <script>
        const p = new URLSearchParams(window.location.search);
        const fields = ['type', 'name', 'email', 'message'];
        fields.forEach(f => {
            const val = p.get(f);
            document.getElementById('hidden-' + f).value = val;
            document.getElementById('display-area').innerHTML += `<div style="margin-bottom:20px;"><label style="font-size:10px; font-weight:700; display:block; margin-bottom:5px;">${f.toUpperCase()}</label><div class="confirm-val">${val}</div></div>`;
        });
    </script>
</body>
</html>
