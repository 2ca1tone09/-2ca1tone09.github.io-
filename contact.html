<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scaL_TONE | CONTACT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&family=Azeret+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 1. SETUP & THEME VARIABLES (Theme_3 Warm Cream / Analog Minimal) */
        :root {
            --bg-color: #ffffff;
            --bg-accent: #ffffff;
            --border-color: #eeeeee;
            --text-primary: #111111;
            --text-secondary: #888888;
            --text-muted: #888888;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: 'Azeret Mono', monospace;
            --transition-speed: 0.5s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-sans);
            padding: 40px 20px 100px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            position: relative;
        }

        /* */
        /* 2. HEADER */
        header {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto 80px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            z-index: 100;
        }

        .current-page {
            font-size: 10px;
            letter-spacing: 0.2em;
            font-weight: 700;
            border-bottom: 1px solid var(--text-primary);
            padding-bottom: 4px;
            text-transform: uppercase;
        }

        /* 
            【極上レスポンシブ固定（追従）メニューボタン】
            スクロールしても左上に追従。他の全ページのデザインルールとシンクロします。
        */
        .menu-trigger {
            position: fixed;
            top: 40px;
            left: max(20px, calc(50% - 600px));
            background: none;
            border: none;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1100; /* サイドバーよりも手前に表示 */
        }

        .menu-trigger img {
            position: absolute;
            width: 26px;
            height: auto;
            object-fit: contain;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), 
                        opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 初期状態: menu1.png (三本バー) がアクティブ、menu2.png (テトラポット) は回転して隠れる */
        .menu-trigger .icon-default {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        .menu-trigger .icon-active {
            opacity: 0;
            transform: rotate(-180deg) scale(0.7);
        }

        /* アクティブ（展開）状態: menu1.png がスピン消去、menu2.png がスピン登場 */
        .menu-trigger.active .icon-default {
            opacity: 0;
            transform: rotate(180deg) scale(0.7);
        }

        .menu-trigger.active .icon-active {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        /* */
        /* 
            15〜20%の割合を占めるスライドイン・サイドバー（MENU-02.pngの完全再現）
        */
        .sidebar-menu {
            position: fixed;
            top: 0;
            left: -260px; /* 初期状態は画面外に隠蔽 */
            width: 240px;
            height: 100vh;
            background-color: #eaeaea; /* マットなライトグレー */
            z-index: 1000;
            padding: 120px 30px 40px; /* 上部にテトラポットボタンの余白を担保 */
            display: flex;
            flex-direction: column;
            gap: 28px;
            transition: left 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.02);
        }

        .sidebar-menu.open {
            left: 0; /* 滑らかに出現 */
        }

        /* サイドバー最上部のブランドマーク (menu2.pngをシンボル表示) */
        .sidebar-logo {
            margin-bottom: 12px;
            display: flex;
            justify-content: flex-start;
        }

        .sidebar-logo img {
            width: 32px;
            height: auto;
            object-fit: contain;
        }

        /* サイドバー内のリンク構造 */
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #111111;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 6px 0;
            position: relative;
        }

        /* アイコンを包むラッパーコンテナを24pxで完全固定 */
        .sidebar-icon-wrapper {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* 指定された画像ファイルを呼び出すサイドバーアイコン用スタイル */
        .sidebar-icon {
            max-width: 16px;
            max-height: 16px;
            width: 100%;
            height: auto;
            object-fit: contain;
            opacity: 0.9;
            transition: transform 0.4s ease;
        }

        .sidebar-item:hover .sidebar-icon {
            transform: scale(1.1);
        }

        /* 【特注】HOMEアイコンのみ、サイズ感を活かすためにwrapper内で最大22pxまで拡張 */
        .sidebar-item.home-link .sidebar-icon {
            max-width: 22px;
            max-height: 22px;
        }

        /* 
           【完全に統一された長さと太さのアンダーバー】
           線の長さ（30px）と太さ（1px）をミリ単位で完全に均一に統一
        */
        .sidebar-item::after {
            content: '';
            position: absolute;
            left: 36px; /* wrapper(24px) + margin(12px) の位置に完全に固定 */
            bottom: 0;
            width: 30px;
            height: 1px;
            background-color: #111111;
            opacity: 0;
            transition: opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* ホバー時に同じ長さ・太さのまま美しくフェードイン */
        .sidebar-item:hover::after {
            opacity: 1;
        }

        /* アクティブなページ（CONTACT）も同じ長さ・太さのまま常時表示 */
        .sidebar-item.active-link::after {
            opacity: 1;
        }

        /* */
        /* 背景のソフトな暗幕（メインコンテンツに集中させるための薄いレイヤー） */
        .menu-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(2px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .menu-backdrop.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* 3. MAIN CONTAINER & 3-COLUMN SYSTEM */
        .contact-container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); /* メニュー開閉時のシフト移動アニメーション */
        }

        /* */
        /* 左カラム：セクションラベル */
        .contact-label {
            grid-column: 1 / 3;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            text-transform: uppercase;
            transition: opacity var(--transition-speed) ease;
        }

        /* 中央カラム：コンテンツエリア */
        .contact-content {
            grid-column: 3 / 8;
            display: flex;
            flex-direction: column;
            gap: 30px;
            position: relative;
        }

        /* 右カラム：余白スペース */
        .contact-right-space {
            grid-column: 8 / 13;
        }

        /* */
        /* 4. PHASES (Input, Confirm, Complete) */
        .form-phase {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease;
            width: 100%;
        }

        /* アクティブなフェーズのみフェードインして表示 */
        .form-phase.active {
            display: flex;
            flex-direction: column;
            gap: 30px;
            opacity: 1;
            transform: translateY(0);
        }

        /* FORM ELEMENTS */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            font-size: 14px;
            background-color: #fafafa;
            outline: none;
            font-family: inherit;
            transition: border-color 0.3s, background-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--text-primary);
            background-color: #ffffff;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* CONFIRM VALUE DISPLAY */
        .confirm-val {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            font-size: 14px;
            background-color: #fafafa;
            color: #333333;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* COMPLETE MESSAGE */
        .complete-message {
            font-size: 14px;
            line-height: 2;
            color: #333333;
            letter-spacing: 0.05em;
        }

        /* BUTTONS */
        .btn-wrapper {
            margin-top: 10px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .btn {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 0.15em;
            border: none;
            background: none;
            border-bottom: 1px solid var(--text-primary);
            padding-bottom: 4px;
            cursor: pointer;
            text-transform: uppercase;
            color: var(--text-primary);
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .btn:hover {
            opacity: 0.5;
        }

        .btn-back {
            color: #888888;
            border-bottom: 1px solid #888888;
        }

        /* 5. FOOTER (BACK TO HOME) */
        footer {
            margin-top: 100px;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease;
        }

        /* 完了フェーズの時のみ、フッターを表示する */
        footer.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .back-link {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--text-primary);
            text-decoration: none;
            border-bottom: 1px solid var(--text-primary);
            padding-bottom: 4px;
            transition: opacity 0.3s ease;
            text-transform: uppercase;
        }

        .back-link:hover {
            opacity: 0.5;
        }

        /* */
        /* CUSTOM TOAST (alert / confirm の代替) */
        .custom-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #111111;
            color: #ffffff;
            padding: 16px 24px;
            font-size: 12px;
            font-family: var(--font-sans);
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 2000;
            border-radius: 2px;
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .custom-toast.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .toast-close {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .toast-close:hover {
            opacity: 1;
        }

        /* Responsive Settings */
        @media (max-width: 768px) {
            .contact-container {
                display: flex;
                flex-direction: column;
                gap: 30px;
            }
            .contact-label {
                margin-bottom: 10px;
            }
            .btn-wrapper {
                gap: 30px;
            }
            .sidebar-menu {
                left: -260px;
            }
            .sidebar-menu.open {
                left: 0;
            }
        }
    </style>
</head>
<body>

    <!-- 背景の薄暗いオーバーレイレイヤー -->
    <div class="menu-backdrop" id="menu-backdrop"></div>

    <!-- ヘッダー -->
    <header>
        <!-- menu1.png ⇄ menu2.png プレミアム変形メニューボタン（fixedで画面に完全追従） -->
        <button class="menu-trigger" id="menu-trigger" aria-label="Menu">
            <img src="/assets/menu1.png" alt="Open Menu" class="menu-icon icon-default" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=M1';">
            <img src="/assets/menu2.png" alt="Close Menu" class="menu-icon icon-active" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=M2';">
        </button>

        <div class="current-page">CONTACT</div>
    </header>

    <!-- -->
    <!-- スライドインするライトグレーサイドバー（MENU-02.pngの完全模写） -->
    <aside class="sidebar-menu" id="sidebar-menu">
        <div class="sidebar-logo">
            <img src="/assets/menu2.png" alt="scaL_TONE Symbol" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=Y';">
        </div>
        <nav class="sidebar-nav">
            <!-- HOME (home-linkクラスを追加してアイコンを大きめに調整) -->
            <a href="index.html" class="sidebar-item home-link">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="/assets/logo3.png" onerror="this.src='https://placehold.co/22x22/111111/ffffff?text=H';" alt="">
                </div>
                HOME
            </a>
            <!-- ABOUT -->
            <a href="about.html" class="sidebar-item">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="/assets/about2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=A';" alt="">
                </div>
                ABOUT
            </a>
            <!-- SHOP -->
            <a href="shop.html" class="sidebar-item">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="/assets/shop2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=S';" alt="">
                </div>
                SHOP
            </a>
            <!-- NEWS -->
            <a href="news.html" class="sidebar-item">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="/assets/news2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=N';" alt="">
                </div>
                NEWS
            </a>
            <!-- WORKS -->
            <a href="works.html" class="sidebar-item">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="/assets/work2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=W';" alt="">
                </div>
                WORKS
            </a>
            <!-- CONTACT (Active) -->
            <a href="contact.html" class="sidebar-item active-link">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="/assets/contact2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=C';" alt="">
                </div>
                CONTACT
            </a>
        </nav>
    </aside>

    <!-- メインコンテンツ -->
    <main>
        <div class="contact-container" id="contact-container">
            <!-- 左カラム：動的に書き換わるラベル -->
            <div class="contact-label" id="phase-label">Input</div>

            <!-- 中央カラム：フェーズ切り替えエリア -->
            <div class="contact-content">
                
                <!-- ================= 1. INPUT PHASE (入力) ================= -->
                <form id="input-form" class="form-phase active">
                    <div class="form-group">
                        <label>Inquiry Type</label>
                        <select id="inquiry-type" required>
                            <option value="" disabled selected>選択してください</option>
                            <option value="ご依頼">ご依頼</option>
                            <option value="見積もり相談">見積もり相談</option>
                            <option value="その他">その他</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="user-name" required placeholder="お名前を入力してください">
                    </div>
                    
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="user-email" required placeholder="example@gmail.com">
                    </div>
                    
                    <div class="form-group">
                        <label>Message</label>
                        <textarea id="user-message" required placeholder="内容を入力してください"></textarea>
                    </div>
                    
                    <div class="btn-wrapper">
                        <a href="index.html" class="btn btn-back">BACK</a>
                        <button type="submit" class="btn">CONFIRM</button>
                    </div>
                </form>

                <!-- ================= 2. CONFIRM PHASE (確認) ================= -->
                <form id="confirm-form" class="form-phase">
                    <div id="display-area" style="display: flex; flex-direction: column; gap: 30px;">
                        <!-- JSで動的に確認項目を注入します -->
                    </div>
                    
                    <div class="btn-wrapper">
                        <button type="button" class="btn btn-back" id="btn-to-input">BACK</button>
                        <button type="submit" class="btn" id="submit-btn">SUBMIT</button>
                    </div>
                </form>

                <!-- ================= 3. COMPLETE PHASE (完了) ================= -->
                <div id="complete-phase" class="form-phase">
                    <p class="complete-message">
                        お問い合わせありがとうございます。<br>
                        確認しだいお返事いたします。
                    </p>
                </div>

            </div>

            <!-- 右カラム -->
            <div class="contact-right-space"></div>
        </div>
    </main>

    <!-- フッター (最初は非表示。完了画面の時だけ出現) -->
    <footer id="footer-nav">
        <a href="index.html" class="back-link">Back to home</a>
    </footer>

    <!-- カスタムトースト表示部 -->
    <div id="custom-toast" class="custom-toast">
        <span id="toast-message">メッセージ</span>
        <button id="close-toast" class="toast-close">&times;</button>
    </div>

    <!-- 超軽量・高品質シームレスアニメーション遷移JS -->
    <script>
        const labelEl = document.getElementById('phase-label');
        const phaseInput = document.getElementById('input-form');
        const phaseConfirm = document.getElementById('confirm-form');
        const phaseComplete = document.getElementById('complete-phase');
        const footerNav = document.getElementById('footer-nav');
        const contactContainer = document.getElementById('contact-container');

        // トースト通知関連
        const toastEl = document.getElementById('custom-toast');
        const toastMessageEl = document.getElementById('toast-message');
        const closeToastBtn = document.getElementById('close-toast');

        function showToast(message) {
            toastMessageEl.innerText = message;
            toastEl.classList.add('show');
            setTimeout(() => {
                toastEl.classList.remove('show');
            }, 6000); // 6秒後に自動消去
        }

        closeToastBtn.addEventListener('click', () => {
            toastEl.classList.remove('show');
        });

        // 入力フォーム送信（CONFIRMボタン押下時）
        phaseInput.addEventListener('submit', function(e) {
            e.preventDefault(); // 本来のサブミットを止める

            // 確認画面用のHTMLを生成して流し込む
            const type = document.getElementById('inquiry-type').value;
            const name = document.getElementById('user-name').value;
            const email = document.getElementById('user-email').value;
            const msg = document.getElementById('user-message').value;

            document.getElementById('display-area').innerHTML = `
                <div class="confirm-group">
                    <label>Inquiry Type</label>
                    <div class="confirm-val">${type}</div>
                </div>
                <div class="confirm-group">
                    <label>Name</label>
                    <div class="confirm-val">${name}</div>
                </div>
                <div class="confirm-group">
                    <label>Email</label>
                    <div class="confirm-val">${email}</div>
                </div>
                <div class="confirm-group">
                    <label>Message</label>
                    <div class="confirm-val">${msg}</div>
                </div>
            `;

            // アニメーション付きでConfirmへ遷移
            switchPhase(phaseInput, phaseConfirm, 'Confirm');
        });

        // 確認画面から入力画面へ戻るボタン押下時
        document.getElementById('btn-to-input').addEventListener('click', function() {
            switchPhase(phaseConfirm, phaseInput, 'Input');
        });

        // 最終確認フォーム送信（SUBMITボタン押下時、Formspreeに非同期で送信）
        phaseConfirm.addEventListener('submit', function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.innerText = "SENDING...";
            submitBtn.disabled = true;

            // 送信データを構築
            const type = document.getElementById('inquiry-type').value;
            const name = document.getElementById('user-name').value;
            const email = document.getElementById('user-email').value;
            const msg = document.getElementById('user-message').value;

            const formData = new FormData();
            formData.append('type', type);
            formData.append('name', name);
            formData.append('email', email);
            formData.append('message', msg);

            // Fetch APIを使って裏側で静かにFormspreeへポスト
            fetch('https://formspree.io/f/xrenekng', {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    // 送信が成功したら、極上のアニメーションと共に完了画面へ
                    switchPhase(phaseConfirm, phaseComplete, 'Complete');
                    // 一番下の「BACK TO HOME」を優雅に出現させる
                    setTimeout(() => {
                        footerNav.classList.add('show');
                    }, 300);
                } else {
                    showToast('送信に失敗しました。時間をおいて再度お試しください。');
                    resetSubmitButton(submitBtn);
                }
            }).catch(error => {
                showToast('通信エラーが発生しました。接続環境をご確認ください。');
                resetSubmitButton(submitBtn);
            });
        });

        // ボタン復帰関数
        function resetSubmitButton(btn) {
            btn.innerText = "SUBMIT";
            btn.disabled = false;
        }

        // フェーズ切り替えアニメーションヘルパー
        function switchPhase(fromPhase, toPhase, nextLabel) {
            // 現在のフェーズをフェードアウト
            fromPhase.style.opacity = '0';
            fromPhase.style.transform = 'translateY(-10px)';
            labelEl.style.opacity = '0';
            
            setTimeout(() => {
                fromPhase.classList.remove('active');
                
                // 次のフェーズをセットアップしてフェードイン
                toPhase.classList.add('active');
                labelEl.innerText = nextLabel;
                
                // 一瞬の遅延を入れることで、CSSトランジションを確実に走らせる
                setTimeout(() => {
                    toPhase.style.opacity = '1';
                    toPhase.style.transform = 'translateY(0)';
                    labelEl.style.opacity = '1';
                }, 50);

                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 300); // fadeOutアニメーション（0.3秒）が終わるのを待つ
        }

        // サイドバーメニュー展開システム（他の全ページと完全同一）
        const trigger = document.getElementById('menu-trigger');
        const menu = document.getElementById('sidebar-menu');
        const backdrop = document.getElementById('menu-backdrop');

        function toggleMenu() {
            const isOpen = menu.classList.toggle('open');
            trigger.classList.toggle('active');
            backdrop.classList.toggle('show');

            // メニューが展開されたら作品グリッドやコンテンツエリア全体を右側にシフトさせて対比空間を演出
            if (isOpen) {
                document.body.style.overflow = 'hidden'; // 背景スクロール禁止
                if (window.innerWidth > 768) {
                    contactContainer.style.transform = 'translateX(60px)';
                }
            } else {
                document.body.style.overflow = '';
                contactContainer.style.transform = 'translateX(0)';
            }
        }

        // クリックイベントの登録
        trigger.addEventListener('click', toggleMenu);
        backdrop.addEventListener('click', toggleMenu);

        // メニュー展開時のリンククリック時にフェードアウトをかける処理
        const links = document.querySelectorAll('.sidebar-item');
        links.forEach(link => {
            link.addEventListener('click', function(e) {
                const targetUrl = this.getAttribute('href');
                if (targetUrl && targetUrl !== '#') {
                    e.preventDefault();
                    
                    // サイドバーを引っ込めて暗幕を解除
                    menu.classList.remove('open');
                    trigger.classList.remove('active');
                    backdrop.classList.remove('show');
                    contactContainer.style.transform = 'translateX(0)';
                    
                    // 優雅なフェードアウトの後に遷移
                    setTimeout(() => {
                        window.location.href = targetUrl;
                    }, 500); 
                }
            });
        });
    </script>
</body>
</html>
