<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | scaL_TONE</title>
    
    <!-- 外部フォント（モダンなArimo、等幅のAzeret Mono）を読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&family=Azeret+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #ffffff;
            --bg-accent: #ffffff;
            --border-color: #eeeeee;
            --text-primary: #111111;
            --text-secondary: #888888;
            --text-muted: #888888;
            --font-sans: 'Arimo', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: 'Azeret Mono', monospace;
            --transition-speed: 0.5s;
        }

        /* グローバルリセット */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-sans); 
            padding: 40px 20px 100px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            position: relative;
            opacity: 1;
            /* 0.6s のスムーズなページフェード設定 */
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        /* ページ切り替え（標準フェードアウト用クラス） */
        body.page-fade-out {
            opacity: 0 !important;
            transform: translateY(-8px);
        }

        /* 標準仕様：固定・追従型スピンメニューボタン（座標ズレ防止のため独立配置） */
        .menu-trigger {
            position: fixed;
            top: 40px;
            left: max(20px, calc(50% - 600px));
            background: none;
            border: none;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1100; /* スライドサイドバーより前面に維持 */
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* メニュー開閉時のアイコン変化アニメーション（標準スピン＆スケール） */
        .menu-trigger img {
            position: absolute;
            width: 26px;
            height: auto;
            object-fit: contain;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .menu-trigger .icon-default { 
            opacity: 1; 
            transform: rotate(0deg) scale(1); 
        }
        
        .menu-trigger .icon-active { 
            opacity: 0; 
            transform: rotate(-180deg) scale(0.7); 
        }

        .menu-trigger.active .icon-default { 
            opacity: 0; 
            transform: rotate(180deg) scale(0.7); 
        }
        
        .menu-trigger.active .icon-active { 
            opacity: 1; 
            transform: rotate(0deg) scale(1); 
        }

        /* 標準仕様：スライドインサイドバー */
        .sidebar-menu {
            position: fixed; 
            top: 0; 
            left: -260px; 
            width: 240px; 
            height: 100vh;
            background-color: #eaeaea; 
            z-index: 1000; 
            padding: 120px 30px 40px;
            transition: left 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; 
            flex-direction: column; 
            gap: 28px;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.02);
        }

        .sidebar-menu.open { 
            left: 0; 
        }

        .sidebar-nav { 
            display: flex; 
            flex-direction: column; 
            gap: 22px; 
        }

        .sidebar-item {
            display: flex; 
            align-items: center; 
            gap: 12px; 
            text-decoration: none;
            color: #111111; 
            font-size: 11px; 
            font-weight: 700; 
            letter-spacing: 0.15em;
            text-transform: uppercase; 
            padding: 6px 0; 
            position: relative;
        }

        .sidebar-icon-wrapper { 
            width: 24px; 
            height: 24px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0; 
        }

        .sidebar-icon { 
            max-width: 16px; 
            max-height: 16px; 
            width: 100%; 
            height: auto; 
            object-fit: contain; 
            opacity: 0.9; 
            transition: transform 0.4s ease;
        }

        .sidebar-item:hover .sidebar-icon {
            transform: scale(1.1);
        }

        .sidebar-item.home-link .sidebar-icon { 
            max-width: 22px; 
            max-height: 22px; 
        }

        /* 完全に統一された30px幅・1px厚の極細アンダーライン */
        .sidebar-item::after {
            content: ''; 
            position: absolute; 
            left: 36px; 
            bottom: 0; 
            width: 30px; 
            height: 1px;
            background-color: #111111; 
            opacity: 0; 
            transition: opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .sidebar-item:hover::after, 
        .sidebar-item.active-link::after { 
            opacity: 1; 
        }

        /* メニュー背景のソフトな半透明すりガラスオーバーレイ */
        .menu-backdrop {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            background-color: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(2px);
            z-index: 999; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .menu-backdrop.show { 
            opacity: 1; 
            pointer-events: auto; 
        }

        /* ヘッダーエリア */
        header {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto 80px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            z-index: 100;
        }

        .current-page {
            font-size: 10px;
            letter-spacing: 0.2em;
            font-weight: 700;
            border-bottom: 1px solid var(--text-primary);
            padding-bottom: 4px;
            text-transform: uppercase;
            font-family: var(--font-mono);
        }

        /* MAIN CONTAINER & 3-COLUMN SYSTEM */
        .contact-container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 左カラム：セクションラベル */
        .contact-label {
            grid-column: 1 / 3;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            text-transform: uppercase;
            font-family: var(--font-mono);
            font-weight: 500;
            transition: opacity var(--transition-speed) ease;
        }

        /* 中央カラム：コンテンツエリア */
        .contact-content {
            grid-column: 3 / 8;
            display: flex;
            flex-direction: column;
            gap: 30px;
            position: relative;
        }

        /* 右カラム：余白スペース */
        .contact-right-space {
            grid-column: 8 / 13;
        }

        /* PHASES (Input, Confirm, Complete) */
        .form-phase {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease;
            width: 100%;
        }

        .form-phase.active {
            display: flex;
            flex-direction: column;
            gap: 30px;
            opacity: 1;
            transform: translateY(0);
        }

        /* FORM ELEMENTS */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            font-family: var(--font-mono);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            font-size: 14px;
            background-color: #fafafa;
            outline: none;
            font-family: inherit;
            transition: border-color 0.3s, background-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--text-primary);
            background-color: #ffffff;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* CONFIRM VALUE DISPLAY */
        .confirm-val {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            font-size: 14px;
            background-color: #fafafa;
            color: #333333;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* COMPLETE MESSAGE */
        .complete-message {
            font-size: 14px;
            line-height: 2;
            color: #333333;
            letter-spacing: 0.05em;
        }

        /* BUTTONS */
        .btn-wrapper {
            margin-top: 10px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .btn {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 0.15em;
            border: none;
            background: none;
            border-bottom: 1px solid var(--text-primary);
            padding-bottom: 4px;
            cursor: pointer;
            text-transform: uppercase;
            color: var(--text-primary);
            text-decoration: none;
            transition: opacity 0.3s;
            font-family: var(--font-mono);
            font-weight: 700;
        }

        .btn:hover {
            opacity: 0.5;
        }

        .btn-back {
            color: #888888;
            border-bottom: 1px solid #888888;
        }

        /* FOOTER (BACK TO HOME) */
        footer {
            margin-top: 100px;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease;
        }

        footer.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* リファレンス画像と同じAzeret Monoフォント（var(--font-mono)）を適用 */
        .back-link {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--text-primary);
            text-decoration: none;
            border-bottom: 1px solid var(--text-primary);
            padding-bottom: 4px;
            transition: opacity 0.3s ease;
            text-transform: uppercase;
            font-family: var(--font-mono); /* リファレンスと同じAzeret Mono */
            font-weight: 700;
            position: relative;
        }

        .back-link::before {
            content: '';
            position: absolute;
            top: -15px;
            bottom: -15px;
            left: -25px;
            right: -25px;
        }

        .back-link:hover {
            opacity: 0.5;
        }

        /* CUSTOM TOAST */
        .custom-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #111111;
            color: #ffffff;
            padding: 16px 24px;
            font-size: 12px;
            font-family: var(--font-sans);
            letter-spacing: 0.08em;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 2000;
            border-radius: 2px;
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        .custom-toast.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .toast-close {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .toast-close:hover {
            opacity: 1;
        }

        /* Responsive Settings */
        @media (max-width: 768px) {
            .contact-container {
                display: flex;
                flex-direction: column;
                gap: 30px;
            }
            .contact-label {
                margin-bottom: 10px;
            }
            .btn-wrapper {
                gap: 30px;
            }
        }
    </style>
</head>
<body>

    <!-- メニュー展開用のすりガラスオーバーレイ暗幕 -->
    <div class="menu-backdrop" id="menu-backdrop"></div>

    <!-- 極上仕様：固定・追従型スピンメニューボタン（座標ズレを防止するため独立配置） -->
    <button class="menu-trigger" id="menu-trigger" aria-label="Menu">
        <img src="assets/menu1.png" alt="Open Menu" class="icon-default" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=M1';">
        <img src="assets/menu2.png" alt="Close Menu" class="icon-active" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=M2';">
    </button>

    <!-- ヘッダーエリア -->
    <header>
        <div class="current-page">CONTACT</div>
    </header>

    <!-- 標準仕様：スライドイン・サイドバー -->
    <aside class="sidebar-menu" id="sidebar-menu">
        <nav class="sidebar-nav">
            <!-- HOME リンク -->
            <a href="index.html" class="sidebar-item home-link">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="assets/logo3.png" onerror="this.src='https://placehold.co/22x22/111111/ffffff?text=H';" alt="">
                </div>
                HOME
            </a>
            <!-- ABOUT リンク -->
            <a href="about.html" class="sidebar-item">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="assets/about2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=A';" alt="">
                </div>
                ABOUT
            </a>
            <!-- SHOP リンク -->
            <a href="shop.html" class="sidebar-item">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="assets/shop2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=S';" alt="">
                </div>
                SHOP
            </a>
            <!-- NEWS リンク -->
            <a href="news.html" class="sidebar-item">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="assets/news2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=N';" alt="">
                </div>
                NEWS
            </a>
            <!-- WORKS リンク -->
            <a href="works.html" class="sidebar-item">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="assets/work2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=W';" alt="">
                </div>
                WORKS
            </a>
            <!-- CONTACT リンク（アクティブ） -->
            <a href="contact.html" class="sidebar-item active-link">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="assets/contact2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=C';" alt="">
                </div>
                CONTACT
            </a>
        </nav>
    </aside>

    <!-- メインコンテンツ -->
    <main>
        <div class="contact-container" id="contact-container">
            <!-- 左カラム：動的に書き換わるラベル -->
            <div class="contact-label" id="phase-label">Input</div>

            <!-- 中央カラム：フェーズ切り替えエリア -->
            <div class="contact-content">
                
                <!-- ================= 1. INPUT PHASE (入力) ================= -->
                <form id="input-form" class="form-phase active">
                    <div class="form-group">
                        <label>Inquiry Type</label>
                        <select id="inquiry-type" required>
                            <option value="" disabled selected>選択してください</option>
                            <option value="ご依頼">ご依頼</option>
                            <option value="見積もり相談">見積もり相談</option>
                            <option value="その他">その他</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="user-name" required placeholder="お名前を入力してください">
                    </div>
                    
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="user-email" required placeholder="example@gmail.com">
                    </div>
                    
                    <div class="form-group">
                        <label>Message</label>
                        <textarea id="user-message" required placeholder="内容を入力してください"></textarea>
                    </div>
                    
                    <div class="btn-wrapper">
                        <a href="index.html" class="btn btn-back">BACK</a>
                        <button type="submit" class="btn">CONFIRM</button>
                    </div>
                </form>

                <!-- ================= 2. CONFIRM PHASE (確認) ================= -->
                <form id="confirm-form" class="form-phase">
                    <div id="display-area" style="display: flex; flex-direction: column; gap: 30px;">
                        <!-- JSで動的に確認項目を注入します -->
                    </div>
                    
                    <div class="btn-wrapper">
                        <button type="button" class="btn btn-back" id="btn-to-input">BACK</button>
                        <button type="submit" class="btn" id="submit-btn">SUBMIT</button>
                    </div>
                </form>

                <!-- ================= 3. COMPLETE PHASE (完了) ================= -->
                <div id="complete-phase" class="form-phase">
                    <p class="complete-message">
                        お問い合わせありがとうございます。<br>
                        確認しだいお返事いたします。
                    </p>
                </div>

            </div>

            <!-- 右カラム -->
            <div class="contact-right-space"></div>
        </div>
    </main>

    <!-- フッター (最初は非表示。完了画面の時だけ出現) -->
    <footer id="footer-nav">
        <a href="index.html" class="back-link">BACK TO HOME</a>
    </footer>

    <!-- カスタムトースト表示部 -->
    <div id="custom-toast" class="custom-toast">
        <span id="toast-message">メッセージ</span>
        <button id="close-toast" class="toast-close">&times;</button>
    </div>

    <!-- アプリケーション制御ロジック -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const labelEl = document.getElementById('phase-label');
            const phaseInput = document.getElementById('input-form');
            const phaseConfirm = document.getElementById('confirm-form');
            const phaseComplete = document.getElementById('complete-phase');
            const footerNav = document.getElementById('footer-nav');
            const contactContainer = document.getElementById('contact-container');

            // トースト通知関連
            const toastEl = document.getElementById('custom-toast');
            const toastMessageEl = document.getElementById('toast-message');
            const closeToastBtn = document.getElementById('close-toast');

            function showToast(message) {
                toastMessageEl.innerText = message;
                toastEl.classList.add('show');
                setTimeout(() => {
                    toastEl.classList.remove('show');
                }, 6000);
            }

            closeToastBtn.addEventListener('click', () => {
                toastEl.classList.remove('show');
            });

            // 入力フォーム送信（CONFIRMボタン押下時）
            phaseInput.addEventListener('submit', function(e) {
                e.preventDefault();

                const type = document.getElementById('inquiry-type').value;
                const name = document.getElementById('user-name').value;
                const email = document.getElementById('user-email').value;
                const msg = document.getElementById('user-message').value;

                document.getElementById('display-area').innerHTML = `
                    <div class="confirm-group">
                        <label style="font-size: 10px; font-weight: 700; letter-spacing: 0.1em; font-family: var(--font-mono);">Inquiry Type</label>
                        <div class="confirm-val">${type}</div>
                    </div>
                    <div class="confirm-group">
                        <label style="font-size: 10px; font-weight: 700; letter-spacing: 0.1em; font-family: var(--font-mono);">Name</label>
                        <div class="confirm-val">${name}</div>
                    </div>
                    <div class="confirm-group">
                        <label style="font-size: 10px; font-weight: 700; letter-spacing: 0.1em; font-family: var(--font-mono);">Email</label>
                        <div class="confirm-val">${email}</div>
                    </div>
                    <div class="confirm-group">
                        <label style="font-size: 10px; font-weight: 700; letter-spacing: 0.1em; font-family: var(--font-mono);">Message</label>
                        <div class="confirm-val">${msg}</div>
                    </div>
                `;

                switchPhase(phaseInput, phaseConfirm, 'Confirm');
            });

            // 確認画面から入力画面へ戻るボタン押下時
            document.getElementById('btn-to-input').addEventListener('click', function() {
                switchPhase(phaseConfirm, phaseInput, 'Input');
            });

            // 最終確認フォーム送信（SUBMITボタン押下時）
            phaseConfirm.addEventListener('submit', function(e) {
                e.preventDefault();

                const submitBtn = document.getElementById('submit-btn');
                submitBtn.innerText = "SENDING...";
                submitBtn.disabled = true;

                const type = document.getElementById('inquiry-type').value;
                const name = document.getElementById('user-name').value;
                const email = document.getElementById('user-email').value;
                const msg = document.getElementById('user-message').value;

                const formData = new FormData();
                formData.append('type', type);
                formData.append('name', name);
                formData.append('email', email);
                formData.append('message', msg);

                fetch('https://formspree.io/f/xrenekng', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                }).then(response => {
                    if (response.ok) {
                        switchPhase(phaseConfirm, phaseComplete, 'Complete');
                        setTimeout(() => {
                            footerNav.classList.add('show');
                        }, 300);
                    } else {
                        showToast('送信に失敗しました。時間をおいて再度お試しください。');
                        resetSubmitButton(submitBtn);
                    }
                }).catch(error => {
                    showToast('通信エラーが発生しました。接続環境をご確認ください。');
                    resetSubmitButton(submitBtn);
                });
            });

            function resetSubmitButton(btn) {
                btn.innerText = "SUBMIT";
                btn.disabled = false;
            }

            // フェーズ切り替えアニメーション
            function switchPhase(fromPhase, toPhase, nextLabel) {
                fromPhase.style.opacity = '0';
                fromPhase.style.transform = 'translateY(-10px)';
                labelEl.style.opacity = '0';
                
                setTimeout(() => {
                    fromPhase.classList.remove('active');
                    toPhase.classList.add('active');
                    labelEl.innerText = nextLabel;
                    
                    setTimeout(() => {
                        toPhase.style.opacity = '1';
                        toPhase.style.transform = 'translateY(0)';
                        labelEl.style.opacity = '1';
                    }, 50);

                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 300);
            }

            // 標準仕様：サイドバーメニュー制御
            const trigger = document.getElementById('menu-trigger');
            const menu = document.getElementById('sidebar-menu');
            const backdrop = document.getElementById('menu-backdrop');

            function toggleMenu() {
                const isOpen = menu.classList.toggle('open');
                trigger.classList.toggle('active');
                backdrop.classList.toggle('show');

                if (isOpen) {
                    document.body.style.overflow = 'hidden'; // 背景スクロール禁止
                    if (window.innerWidth > 1024) {
                        contactContainer.style.transform = 'translateX(60px)';
                    }
                } else {
                    document.body.style.overflow = '';
                    contactContainer.style.transform = 'translateX(0)';
                }
            }

            trigger.addEventListener('click', toggleMenu);
            backdrop.addEventListener('click', toggleMenu);

            // 標準仕様：ページ遷移イージング（600ms フェードアウト）
            const transitLinks = document.querySelectorAll('.sidebar-item, .back-link, .btn-back[href]');
            transitLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    const targetUrl = this.getAttribute('href');
                    if (targetUrl && targetUrl !== '#' && !targetUrl.startsWith('javascript:')) {
                        e.preventDefault();
                        
                        menu.classList.remove('open');
                        trigger.classList.remove('active');
                        backdrop.classList.remove('show');
                        contactContainer.style.transform = 'translateX(0)';
                        document.body.style.overflow = '';
                        
                        document.body.classList.add('page-fade-out');
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 600); 
                    }
                });
            });
        });
    </script>
</body>
</html>
