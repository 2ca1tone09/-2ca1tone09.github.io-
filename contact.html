<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | scaL_TONE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #ffffff; color: #111111; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 40px 20px 100px; }
        header { max-width: 1200px; margin: 0 auto 80px; display: flex; justify-content: flex-end; }
        .current-page { font-size: 10px; letter-spacing: 0.2em; font-weight: 700; border-bottom: 1px solid #111; padding-bottom: 4px; }
        .contact-container { display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; padding: 45px 0; border-top: 1px solid #eeeeee; }
        .contact-label { grid-column: 1 / 3; font-size: 10px; letter-spacing: 0.1em; color: #888888; text-transform: uppercase; }
        .contact-content { grid-column: 3 / 8; display: flex; flex-direction: column; gap: 30px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 10px; font-weight: 700; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e0e0e0; font-size: 14px; background-color: #fafafa; outline: none; }
        .btn { display: inline-block; font-size: 11px; letter-spacing: 0.15em; border-bottom: 1px solid #111; padding-bottom: 4px; cursor: pointer; text-transform: uppercase; margin-top: 20px; border: none; background: none; }
        @media (max-width: 768px) { .contact-container { display: flex; flex-direction: column; } }
    </style>
</head>
<body>
    <header><div class="current-page">CONTACT</div></header>
    <main>
        <form action="contact-confirm.html" method="GET" class="contact-container">
            <div class="contact-label">Input</div>
            <div class="contact-content">
                <div class="form-group"><label>Inquiry Type</label>
                    <select name="type" required><option value="" disabled selected>選択してください</option>
                    <option value="ご依頼">ご依頼</option><option value="見積もり相談">見積もり相談</option><option value="その他">その他</option></select>
                </div>
                <div class="form-group"><label>Name</label><input type="text" name="name" required></div>
                <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
                <div class="form-group"><label>Message</label><textarea name="message" required></textarea></div>
                <button type="submit" class="btn">CONFIRM</button>
            </div>
        </form>
    </main>
</body>
</html>
