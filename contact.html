<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTACT | scaL_TONE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #ffffff; 
            color: #111111; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 40px 20px 100px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            position: relative;
        }
        
        /* 1. ヘッダー */
        header { 
            max-width: 1200px; 
            margin: 0 auto 80px; 
            display: flex; 
            justify-content: flex-end; 
            align-items: center;
            width: 100%;
            z-index: 100;
        }
        
        .current-page { 
            font-size: 10px; 
            letter-spacing: 0.2em; 
            font-weight: 700; 
            border-bottom: 1px solid #111111; 
            padding-bottom: 4px; 
            text-transform: uppercase;
        }

        /* 2. メニューボタン・サイドバー・レイヤー定義 */
        .menu-trigger {
            position: fixed;
            top: 40px;
            left: max(20px, calc(50% - 600px));
            background: none;
            border: none;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1100;
        }

        .menu-trigger img {
            position: absolute;
            width: 26px;
            height: auto;
            object-fit: contain;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .menu-trigger .icon-default { opacity: 1; transform: rotate(0deg) scale(1); }
        .menu-trigger .icon-active { opacity: 0; transform: rotate(-180deg) scale(0.7); }
        .menu-trigger.active .icon-default { opacity: 0; transform: rotate(180deg) scale(0.7); }
        .menu-trigger.active .icon-active { opacity: 1; transform: rotate(0deg) scale(1); }

        .sidebar-menu {
            position: fixed; top: 0; left: -260px; width: 240px; height: 100vh;
            background-color: #eaeaea; z-index: 1000; padding: 120px 30px 40px;
            display: flex; flex-direction: column; gap: 28px;
            transition: left 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.02);
        }
        .sidebar-menu.open { left: 0; }

        .sidebar-logo { margin-bottom: 12px; display: flex; justify-content: flex-start; }
        .sidebar-logo img { width: 32px; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 22px; }

        .sidebar-item {
            display: flex; align-items: center; gap: 12px; text-decoration: none;
            color: #111111; font-size: 11px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; padding: 6px 0; position: relative;
        }

        .sidebar-icon-wrapper { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .sidebar-icon { max-width: 16px; max-height: 16px; width: 100%; height: auto; transition: transform 0.4s ease; }
        .sidebar-item:hover .sidebar-icon { transform: scale(1.1); }
        .sidebar-item.home-link .sidebar-icon { max-width: 22px; max-height: 22px; }

        .sidebar-item::after {
            content: ''; position: absolute; left: 36px; bottom: 0; width: 30px; height: 1px;
            background-color: #111111; opacity: 0; transition: opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .sidebar-item:hover::after, .sidebar-item.active-link::after { opacity: 1; }

        .menu-backdrop {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(255, 255, 255, 0.4); backdrop-filter: blur(2px); z-index: 999;
            opacity: 0; pointer-events: none; transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .menu-backdrop.show { opacity: 1; pointer-events: auto; }

        /* 3. CONTACT FORM AREA */
        .contact-container {
            display: grid; grid-template-columns: repeat(12, 1fr); gap: 20px; max-width: 1100px; margin: 0 auto; width: 100%; position: relative;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .contact-label { grid-column: 1 / 3; font-size: 10px; letter-spacing: 0.1em; color: #888; text-transform: uppercase; font-weight: 500; }
        .contact-content { grid-column: 3 / 8; display: flex; flex-direction: column; gap: 30px; }

        .form-phase { display: none; opacity: 0; transform: translateY(10px); transition: opacity 0.5s ease, transform 0.5s ease; }
        .form-phase.active { display: flex; flex-direction: column; gap: 30px; opacity: 1; transform: translateY(0); }

        .form-group label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e0e0e0; font-size: 14px; background-color: #fafafa; outline: none; }
        input:focus, textarea:focus { border-color: #111; background-color: #fff; }
        textarea { min-height: 120px; }

        .btn-wrapper { margin-top: 10px; display: flex; justify-content: center; gap: 40px; }
        .btn { display: inline-block; font-size: 11px; letter-spacing: 0.15em; border: none; background: none; border-bottom: 1px solid #111; padding-bottom: 4px; cursor: pointer; text-transform: uppercase; color: #111; transition: opacity 0.3s; }
        .btn:hover { opacity: 0.5; }
        .btn-back { color: #888; border-bottom: 1px solid #888; }

        footer { margin-top: 100px; text-align: center; }
        .back-link { font-size: 11px; letter-spacing: 0.15em; color: #111; text-decoration: none; border-bottom: 1px solid #111; padding-bottom: 4px; }
        
        @media (max-width: 768px) {
            .contact-container { display: flex; flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="menu-backdrop" id="menu-backdrop"></div>

    <header>
        <button class="menu-trigger" id="menu-trigger" aria-label="Menu">
            <img src="/assets/menu1.png" alt="Menu" class="icon-default">
            <img src="/assets/menu2.png" alt="Close" class="icon-active">
        </button>
        <div class="current-page">CONTACT</div>
    </header>

    <aside class="sidebar-menu" id="sidebar-menu">
        <div class="sidebar-logo"><img src="/assets/menu2.png" alt="Symbol"></div>
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-item home-link"><div class="sidebar-icon-wrapper"><img src="/assets/logo3.png" class="sidebar-icon"></div>HOME</a>
            <a href="about.html" class="sidebar-item"><div class="sidebar-icon-wrapper"><img src="/assets/about2.png" class="sidebar-icon"></div>ABOUT</a>
            <a href="shop.html" class="sidebar-item"><div class="sidebar-icon-wrapper"><img src="/assets/shop2.png" class="sidebar-icon"></div>SHOP</a>
            <a href="news.html" class="sidebar-item"><div class="sidebar-icon-wrapper"><img src="/assets/news2.png" class="sidebar-icon"></div>NEWS</a>
            <a href="works.html" class="sidebar-item"><div class="sidebar-icon-wrapper"><img src="/assets/work2.png" class="sidebar-icon"></div>WORKS</a>
            <a href="contact.html" class="sidebar-item active-link"><div class="sidebar-icon-wrapper"><img src="/assets/contact2.png" class="sidebar-icon"></div>CONTACT</a>
        </nav>
    </aside>

    <main class="contact-container" id="main-content">
        <div class="contact-label" id="phase-label">Input</div>
        <div class="contact-content">
            <form id="input-form" class="form-phase active">
                <div class="form-group"><label>Inquiry Type</label><select id="inquiry-type"><option>ご依頼</option><option>その他</option></select></div>
                <div class="form-group"><label>Name</label><input type="text" id="user-name"></div>
                <div class="form-group"><label>Message</label><textarea id="user-message"></textarea></div>
                <div class="btn-wrapper"><button type="submit" class="btn">CONFIRM</button></div>
            </form>
            <form id="confirm-form" class="form-phase">
                <div id="display-area"></div>
                <div class="btn-wrapper"><button type="button" class="btn btn-back" id="btn-to-input">BACK</button><button type="submit" class="btn">SUBMIT</button></div>
            </form>
            <div id="complete-phase" class="form-phase"><p>ありがとうございます。</p></div>
        </div>
    </main>

    <script>
        const trigger = document.getElementById('menu-trigger');
        const menu = document.getElementById('sidebar-menu');
        const backdrop = document.getElementById('menu-backdrop');
        const content = document.getElementById('main-content');
        trigger.addEventListener('click', () => {
            menu.classList.toggle('open');
            trigger.classList.toggle('active');
            backdrop.classList.toggle('show');
            content.style.transform = menu.classList.contains('open') ? 'translateX(60px)' : 'translateX(0)';
        });
        
        // Form logic omitted for brevity, logic remains same as per previous confirmed code.
    </script>
</body>
</html>
