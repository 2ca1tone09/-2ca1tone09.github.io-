<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scaL_TONE</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #ffffff;
            color: #111111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            padding: 20px;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        /* ロゴのアニメーション：2.5秒かけてゆっくりと浮き上がります */
        .logo {
            max-width: 180px;
            width: 100%;
            height: auto;
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeInLogo 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* ナビゲーションメニューの配置 */
        .nav-menu {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 32px;
            list-style: none;
            width: 100%;
        }

        /* 各メニュー項目のスタイル */
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #111111;
            opacity: 0; /* 最初は非表示 */
            animation: fadeInNav 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        /* マウスを乗せたときに少しだけ上にスライドするエレガントな効果 */
        .nav-item:hover {
            transform: translateY(-2px);
        }

        /* アイコン画像のサイズを均一にし、アスペクト比を保ちます */
        .nav-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
            margin-bottom: 12px;
        }

        /* テキストのスタイル */
        .nav-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* 
           【重要】シーケンシャル・フェードイン（順序よく現れるアニメーション）
           ロゴのフェードイン(2.5s)の終わりかけ（1.8秒時点）から、
           0.2秒ずつタイミングをずらしてアイコンを出現させます。
        */
        .nav-item:nth-child(1) { animation-delay: 1.8s; } /* ABOUT */
        .nav-item:nth-child(2) { animation-delay: 2.0s; } /* SHOP */
        .nav-item:nth-child(3) { animation-delay: 2.2s; } /* NEWS */
        .nav-item:nth-child(4) { animation-delay: 2.4s; } /* WORKS */
        .nav-item:nth-child(5) { animation-delay: 2.6s; } /* CONTACT */

        @keyframes fadeInLogo {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInNav {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 中央のブランドロゴ -->
        <img src="IMG_7404.jpeg" alt="scaL_TONE" class="logo">

        <!-- 順序よくフェードインするナビゲーション -->
        <nav class="nav-menu">
            <!-- 各項目をクリックすると、対応する個別のhtmlページに移動します -->
            <a href="about.html" class="nav-item">
                <img src="about.png" alt="" class="nav-icon">
                <span class="nav-label">ABOUT</span>
            </a>
            <a href="shop.html" class="nav-item">
                <img src="shop.png" alt="" class="nav-icon">
                <span class="nav-label">SHOP</span>
            </a>
            <a href="news.html" class="nav-item">
                <img src="news.png" alt="" class="nav-icon">
                <span class="nav-label">NEWS</span>
            </a>
            <a href="works.html" class="nav-item">
                <!-- image_14.png で確認した「work.png」を指定しています -->
                <img src="work.png" alt="" class="nav-icon">
                <span class="nav-label">WORKS</span>
            </a>
            <a href="contact.html" class="nav-item">
                <img src="contact.png" alt="" class="nav-icon">
                <span class="nav-label">CONTACT</span>
            </a>
        </nav>
    </div>
</body>
</html>
