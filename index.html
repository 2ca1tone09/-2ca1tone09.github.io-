<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scaL_TONE</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #ffffff;
            color: #111111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            padding: 20px;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        /* 1. 中央のロゴ（初期状態：心臓の拍動アニメーション） */
        .logo-wrapper {
            display: inline-block;
            margin-bottom: 50px;
            transition: margin-bottom 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .logo {
            max-width: 180px;
            width: 100%;
            height: auto;
            cursor: pointer;
            /* 心臓の拍動アニメーション（無限ループ） */
            animation: heartbeat 2.0s infinite ease-in-out;
            transition: transform 0.5s ease;
        }

        /* 2. ナビゲーションメニュー（最初は非表示、かつクリック不可） */
        .nav-menu {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 32px;
            list-style: none;
            width: 100%;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* メニュー項目のスタイル */
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #111111;
            transition: transform 0.3s ease, opacity 0.5s ease;
            cursor: pointer;
        }

        /* ホバー時の緩やかな浮き上がり */
        .nav-item:hover {
            transform: translateY(-2px);
        }

        /* アイコン画像の設定 */
        .nav-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
            margin-bottom: 12px;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease;
        }

        /* テキストの設定 */
        .nav-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* --- 状態変更用クラス (JavaScriptで制御) --- */

        /* ロゴをクリックした後のレイアウト調整 */
        .activated .logo-wrapper {
            margin-bottom: 50px; /* 位置を定位置に固定 */
        }
        
        /* 拍動アニメーションを止める */
        .activated .logo {
            animation: none;
            transform: scale(1);
        }

        /* ナビゲーションを飛び出させて表示する */
        .activated .nav-menu {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        /* ページ遷移時の演出：クリックされたアイコンは一回転して消える */
        .nav-item.clicked .nav-icon {
            transform: rotate(360deg) scale(0.8);
            opacity: 0;
        }

        /* ページ遷移時の演出：クリックされなかった他の項目はフェードアウト */
        .nav-item.fade-out {
            opacity: 0 !important;
            transform: translateY(4px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* ページ遷移時：中央のロゴも一緒にフェードアウト */
        .logo-wrapper.fade-out {
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* 心臓の拍動（鼓動）アニメーション */
        @keyframes heartbeat {
            0% {
                transform: scale(1);
                opacity: 0.85;
            }
            14% {
                transform: scale(1.08);
                opacity: 1;
            }
            28% {
                transform: scale(1);
                opacity: 0.85;
            }
            42% {
                transform: scale(1.08);
                opacity: 1;
            }
            70% {
                transform: scale(1);
                opacity: 0.85;
            }
            100% {
                transform: scale(1);
                opacity: 0.85;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <div class="logo-wrapper" id="logo-wrap">
            <img src="/assets/logo2.png" alt="scaL_TONE" class="logo" id="logo">
        </div>

        <nav class="nav-menu">
            <a href="about.html" class="nav-item">
                <img src="/assets/about.png" alt="" class="nav-icon">
                <span class="nav-label">ABOUT</span>
            </a>
            <a href="shop.html" class="nav-item">
                <img src="/assets/shop.png" alt="" class="nav-icon">
                <span class="nav-label">SHOP</span>
            </a>
            <a href="news.html" class="nav-item">
                <img src="/assets/news.png" alt="" class="nav-icon">
                <span class="nav-label">NEWS</span>
            </a>
            <a href="works.html" class="nav-item">
                <img src="/assets/work.png" alt="" class="nav-icon">
                <span class="nav-label">WORKS</span>
            </a>
            <a href="contact.html" class="nav-item">
                <img src="/assets/contact.png" alt="" class="nav-icon">
                <span class="nav-label">CONTACT</span>
            </a>
        </nav>
    </div>

    <script>
        const container = document.getElementById('main-container');
        const logo = document.getElementById('logo');
        const logoWrap = document.getElementById('logo-wrap');

        // 1. ロゴクリック時の「メニュー飛び出し（アクティベート）」処理
        logo.addEventListener('click', function() {
            if (!container.classList.contains('activated')) {
                // アクティブ用クラスを付与してナビゲーションを展開
                container.classList.add('activated');
            }
        });

        // 2. 各メニューをクリックした時の「ページ遷移」処理
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                
                const targetUrl = this.getAttribute('href');
                const allItems = document.querySelectorAll('.nav-item');

                // ロゴと他の項目をスムーズに消去
                allItems.forEach(el => {
                    if (el !== this) {
                        el.classList.add('fade-out');
                    }
                });
                logoWrap.classList.add('fade-out');

                // 自分自身を回転フェードアウト
                this.classList.add('clicked');

                // アニメーション完了後に遷移
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 600);
            });
        });
    </script>
</body>
</html>
