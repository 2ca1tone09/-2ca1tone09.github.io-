<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scaL_TONE</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #ffffff;
            color: #111111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            padding: 20px;
        }
        .container {
            text-align: center;
            opacity: 0;
            animation: fadeIn 1.5s ease-in-out forwards;
        }
        .logo-placeholder {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 0.3em;
            color: #888888;
            text-transform: uppercase;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ロゴ画像を表示させます。サイズはミニマルに少し小さめに設定しています -->
        <img src="IMG_7404.jpeg" alt="scaL_TONE" style="max-width: 200px; width: 100%; height: auto; margin-bottom: 30px;">
        <p class="subtitle">Coming Soon</p>
    </div>
</body>
</html>
