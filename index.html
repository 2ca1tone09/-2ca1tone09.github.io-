<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scaL_TONE</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background-color: #ffffff;
            color: #111111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            padding: 20px;
        }
        
        .container {
            position: relative;
            width: 600px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 画面幅が小さい場合は全体をそのまま縮小してレイアウト崩れを防ぐ */
            transition: transform 0.3s ease;
        }

        @media (max-width: 650px) {
            .container { transform: scale(0.65); }
        }
        @media (max-width: 400px) {
            .container { transform: scale(0.55); }
        }

        /* 1. 中央のロゴ（初期フェードイン ➡ ゆったりとした拍動へ） */
        .logo-wrapper {
            position: relative;
            z-index: 10;
            opacity: 0;
            /* 起動時：4秒かけてフェードイン ➡ その後3秒の遅延（起動中盤）から3.5秒周期の深い鼓動を開始 */
            animation: fadeInLogo 4.0s cubic-bezier(0.4, 0, 0.2, 1) forwards, 
                       heartbeat 3.5s infinite ease-in-out 3.0s;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        
        .logo {
            max-width: 200px;
            width: 100%;
            height: auto;
            cursor: pointer;
            display: block;
        }

        /* 2. 背景の回転する一点鎖線の円 */
        .circle-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 480px; /* 直径480 = 半径240pxの軌道 */
            height: 480px;
            transform: translate(-50%, -50%) rotate(0deg);
            opacity: 0;
            pointer-events: none;
            /* メニュー展開の後にふわっとエレガントに出現させる */
            transition: opacity 1.2s ease 0.6s;
            z-index: 1;
        }

        .activated .circle-ring {
            opacity: 1;
            /* 待機中はゆっくりと回転し続ける */
            animation: rotateRing 60s linear infinite;
        }

        @keyframes rotateRing {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 3. ナビゲーションメニュー */
        .nav-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* 各ナビゲーション項目（初期状態：ロゴの中心に重なって完全に隠れている） */
        .nav-item {
            position: absolute;
            top: 50%;
            left: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #111111;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            
            /* 初期位置：ロゴの中心（中心から少し傾けておく） */
            transform: translate(-50%, -50%) scale(0) rotate(15deg);
            /* 飛び出す際のスプリング感（イージング）を設定 */
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        opacity 0.6s ease;
            transition-delay: var(--delay);
        }

        /* ロゴタップ後：鼓動を止め、ナビゲーションを放射状に展開 */
        .activated .logo-wrapper {
            animation: none;
            opacity: 1;
        }

        .activated .nav-item {
            opacity: 1;
            pointer-events: auto;
            /* 定位置（HTML側の --tx, --ty オフセット）へバネのように弾けて着地 */
            transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1) rotate(0deg);
        }

        /* ホバー時の緩やかな浮き上がり */
        .nav-item:hover {
            transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty) - 4px)) scale(1.05) !important;
        }

        /* アイコン画像とテキストの設定 */
        .nav-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
            margin-bottom: 12px;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease;
        }

        .nav-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* ページ遷移時：クリックされたメニューアイコンが一回転しながらフェードアウト */
        .nav-item.clicked .nav-icon {
            transform: rotate(360deg) scale(0);
            opacity: 0;
        }

        /* ページ遷移時：クリックされなかった他のメニューは下に落ちながら静かに0.5sでフェードアウト */
        .nav-item.fade-out {
            opacity: 0 !important;
            transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty) + 15px)) scale(0.9) !important;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        /* ページ遷移時：ロゴと円も一緒に静かに消去 */
        .logo-wrapper.fade-out {
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .circle-ring.fade-out {
            opacity: 0 !important;
            transition: opacity 0.5s ease;
        }

        /* 起動時のロゴフェードインと拍動アニメーション */
        @keyframes fadeInLogo {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes heartbeat {
            0% { transform: scale(1); opacity: 0.8; }
            12% { transform: scale(1.05); opacity: 1; }
            24% { transform: scale(1); opacity: 0.8; }
            36% { transform: scale(1.05); opacity: 1; }
            60% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        
        <!-- 回転する図面風の一点鎖線の円 -->
        <div class="circle-ring" id="circle-ring">
            <svg viewBox="0 0 500 500" width="100%" height="100%" style="overflow: visible;">
                <!-- 長さ24、空白8、長さ4、空白8 のパターンで図面の一点鎖線を表現 -->
                <circle cx="250" cy="250" r="240" fill="none" stroke="#111111" stroke-width="1" stroke-dasharray="24 8 4 8" />
            </svg>
        </div>

        <!-- ロゴ -->
        <div class="logo-wrapper" id="logo-wrap">
            <img src="/assets/logo2.png" alt="scaL_TONE" class="logo" id="logo" onerror="this.src='https://placehold.co/180x180/ffffff/111111?text=scaL_TONE';">
        </div>

        <!-- 
            半径240pxの円周上に沿った座標計算 (cos, sin) で配置
            ABOUT: 180度 (左端)
            SHOP: 135度 (左下)
            NEWS: 90度 (真下)
            WORKS: 45度 (右下)
            CONTACT: 0度 (右端)
        -->
        <nav class="nav-menu">
            <a href="about.html" class="nav-item" style="--tx: -230px; --ty: 0px; --delay: 0.0s;">
                <img src="/assets/about2.png" alt="" class="nav-icon" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=A';">
                <span class="nav-label">ABOUT</span>
            </a>
            <a href="shop.html" class="nav-item" style="--tx: -170px; --ty: 170px; --delay: 0.05s;">
                <img src="/assets/shop2.png" alt="" class="nav-icon" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=S';">
                <span class="nav-label">SHOP</span>
            </a>
            <a href="news.html" class="nav-item" style="--tx: 0px; --ty: 240px; --delay: 0.1s;">
                <img src="/assets/news2.png" alt="" class="nav-icon" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=N';">
                <span class="nav-label">NEWS</span>
            </a>
            <a href="works.html" class="nav-item" style="--tx: 170px; --ty: 170px; --delay: 0.15s;">
                <img src="/assets/work2.png" alt="" class="nav-icon" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=W';">
                <span class="nav-label">WORKS</span>
            </a>
            <a href="contact.html" class="nav-item" style="--tx: 230px; --ty: 0px; --delay: 0.2s;">
                <img src="/assets/contact2.png" alt="" class="nav-icon" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=C';">
                <span class="nav-label">CONTACT</span>
            </a>
        </nav>
    </div>

    <script>
        const container = document.getElementById('main-container');
        const logo = document.getElementById('logo');
        const logoWrap = document.getElementById('logo-wrap');
        const circleRing = document.getElementById('circle-ring');

        // 1. ロゴクリック時に放射状にメニューをポップアップさせる
        logo.addEventListener('click', function() {
            if (!container.classList.contains('activated')) {
                container.classList.add('activated');
            }
        });

        // 2. メニュークリック時に回転＆フェードアウトして遷移
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                
                const targetUrl = this.getAttribute('href');
                const allItems = document.querySelectorAll('.nav-item');

                // 他のメニュー、ロゴ、そして背景の円も即座にフェードアウト
                allItems.forEach(el => {
                    if (el !== this) {
                        el.classList.add('fade-out');
                    }
                });
                logoWrap.classList.add('fade-out');
                circleRing.classList.add('fade-out');

                // クリックされたメニューアイコン自身を回転縮小消去
                this.classList.add('clicked');

                // アニメーション完了（0.6秒）後にページ遷移
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 600);
            });
        });
    </script>
</body>
</html>
