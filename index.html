<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scaL_TONE</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #ffffff;
            color: #111111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            padding: 20px;
        }
        .container {
            text-align: center;
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        /* 1. 中央のロゴ（初期フェードイン ➡ ゆったりとした拍動へ） */
        .logo-wrapper {
            display: inline-block;
            margin-bottom: 50px;
            opacity: 0;
            /* 起動時：1.8秒かけてフェードイン ➡ 4.0秒後から3.5秒周期の深い鼓動を開始 */
            animation: fadeInLogo 4.0s cubic-bezier(0.4, 0, 0.2, 1) forwards, 
                       heartbeat 3.5s infinite ease-in-out 3.0s;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        
        .logo {
            max-width: 180px;
            width: 100%;
            height: auto;
            cursor: pointer;
            display: block;
        }

        /* 2. ナビゲーションメニュー */
        .nav-menu {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 32px;
            list-style: none;
            width: 100%;
            position: relative;
        }

        /* 各ナビゲーション項目（初期状態：ロゴの中心に重なって完全に隠れている） */
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #111111;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            
            /* 初期位置：ロゴの中心（上方向へ120pxオフセットして重なる） */
            transform: translateY(-120px) scale(0) rotate(15deg);
            /* 飛び出す際のスプリング感（イージング）を設定 */
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        opacity 0.6s ease;
        }

        /* 放射状に飛び出すための各項目の初期角度と位置の微調整 */
        .nav-item:nth-child(1) { --dx: 150px;  --rotate: -20deg; transition-delay: 0.0s; } /* ABOUT */
        .nav-item:nth-child(2) { --dx: 75px;   --rotate: -10deg; transition-delay: 0.05s; } /* SHOP */
        .nav-item:nth-child(3) { --dx: 0px;    --rotate: 0deg;   transition-delay: 0.1s; }  /* NEWS */
        .nav-item:nth-child(4) { --dx: -75px;  --rotate: 10deg;  transition-delay: 0.15s; } /* WORKS */
        .nav-item:nth-child(5) { --dx: -150px; --rotate: 20deg;  transition-delay: 0.2s; }  /* CONTACT */

        /* 初期非アクティブ時の位置を個別定義（ロゴの中心に収束） */
        .nav-item {
            transform: translate(var(--dx), -120px) scale(0) rotate(var(--rotate));
        }

        /* ホバー時の緩やかな浮き上がり */
        .nav-item:hover {
            transform: translate(0, -4px) scale(1.05) !important;
        }

        /* アイコン画像の設定 */
        .nav-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
            margin-bottom: 12px;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease;
        }

        /* テキストの設定 */
        .nav-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* --- 状態変更用クラス (JavaScriptで制御) --- */

        /* ロゴタップ後：鼓動を止め、ナビゲーションを放射状に展開 */
        .activated .logo-wrapper {
            animation: none;
            opacity: 1;
        }

        .activated .nav-item {
            opacity: 1;
            pointer-events: auto;
            /* 定位置（オフセットなし）へバネのように弾けて着地 */
            transform: translate(0, 0) scale(1) rotate(0deg);
        }

        /* ページ遷移時：クリックされたメニューアイコンが一回転しながらフェードアウト */
        .nav-item.clicked .nav-icon {
            transform: rotate(360deg) scale(0);
            opacity: 0;
        }

        /* ページ遷移時：クリックされなかった他のメニューは静かにフェードアウト */
        .nav-item.fade-out {
            opacity: 0 !important;
            transform: translateY(10px) scale(0.9);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* ページ遷移時：ロゴも一緒にフェードアウト */
        .logo-wrapper.fade-out {
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* --- アニメーション定義 --- */

        /* 起動時のロゴフェードイン */
        @keyframes fadeInLogo {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 3.5秒周期の深くゆったりとした鼓動（心拍） */
        @keyframes heartbeat {
            0% { transform: scale(1); opacity: 0.8; }
            12% { transform: scale(1.05); opacity: 1; }
            24% { transform: scale(1); opacity: 0.8; }
            36% { transform: scale(1.05); opacity: 1; }
            60% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <div class="logo-wrapper" id="logo-wrap">
            <img src="/assets/logo2.png" alt="scaL_TONE" class="logo" id="logo">
        </div>

        <nav class="nav-menu">
            <a href="about.html" class="nav-item">
                <img src="/assets/about.png" alt="" class="nav-icon">
                <span class="nav-label">ABOUT</span>
            </a>
            <a href="shop.html" class="nav-item">
                <img src="/assets/shop.png" alt="" class="nav-icon">
                <span class="nav-label">SHOP</span>
            </a>
            <a href="news.html" class="nav-item">
                <img src="/assets/news.png" alt="" class="nav-icon">
                <span class="nav-label">NEWS</span>
            </a>
            <a href="works.html" class="nav-item">
                <img src="/assets/work.png" alt="" class="nav-icon">
                <span class="nav-label">WORKS</span>
            </a>
            <a href="contact.html" class="nav-item">
                <img src="/assets/contact.png" alt="" class="nav-icon">
                <span class="nav-label">CONTACT</span>
            </a>
        </nav>
    </div>

    <script>
        const container = document.getElementById('main-container');
        const logo = document.getElementById('logo');
        const logoWrap = document.getElementById('logo-wrap');

        // 1. ロゴクリック時に放射状にメニューをポップアップさせる
        logo.addEventListener('click', function() {
            if (!container.classList.contains('activated')) {
                container.classList.add('activated');
            }
        });

        // 2. メニュークリック時に回転＆フェードアウトして遷移
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                
                const targetUrl = this.getAttribute('href');
                const allItems = document.querySelectorAll('.nav-item');

                // 他のメニューとロゴを即座にフェードアウト
                allItems.forEach(el => {
                    if (el !== this) {
                        el.classList.add('fade-out');
                    }
                });
                logoWrap.classList.add('fade-out');

                // クリックされたメニューアイコン自身を回転縮小消去
                this.classList.add('clicked');

                // アニメーション完了（0.6秒）後にページ遷移
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 600);
            });
        });
    </script>
</body>
</html>
