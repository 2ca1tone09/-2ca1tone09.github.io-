<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWS | scaL_TONE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #ffffff;
            color: #111111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 40px 20px 100px;
        }

        /* 右上のページ表示 */
        header {
            max-width: 1200px;
            margin: 0 auto 80px;
            display: flex;
            justify-content: flex-end;
        }

        .current-page {
            font-size: 10px;
            letter-spacing: 0.2em;
            font-weight: 700;
            color: #111;
            text-transform: uppercase;
            border-bottom: 1px solid #111;
            padding-bottom: 4px;
        }

        /* ニュースフィードのコンテナ */
        .news-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* 個別のニュース項目（ラインで区切る） */
        .news-item {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            padding: 45px 0;
            border-top: 1px solid #eeeeee;
            opacity: 0;
            animation: fadeIn 1.2s ease-out forwards;
        }

        .news-item:last-child {
            border-bottom: 1px solid #eeeeee; /* 最後だけ下にも線を引く */
        }

        /* 左カラム：ラベル */
        .news-label {
            grid-column: 1 / 3;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: #888888;
            font-weight: 500;
            text-transform: uppercase;
        }

        /* 中央カラム：内容 */
        .news-content {
            grid-column: 3 / 8;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .news-text {
            font-size: 14px;
            line-height: 1.8;
            letter-spacing: 0.02em;
            color: #333333;
            margin-bottom: 30px;
        }

        .learn-more {
            font-size: 10px;
            letter-spacing: 0.15em;
            color: #111;
            text-decoration: none;
            border-bottom: 1px solid #111;
            width: fit-content;
            padding-bottom: 2px;
            transition: opacity 0.3s;
        }

        .learn-more:hover { opacity: 0.5; }

        /* 右カラム：画像 */
        .news-image {
            grid-column: 8 / 13;
            overflow: hidden;
        }

        .news-image img {
            width: 100%;
            height: auto;
            display: block;
            filter: grayscale(100%); /* モノクロにしてブランドを統一 */
            transition: filter 0.5s;
        }

        .news-item:hover .news-image img {
            filter: grayscale(0%);
        }

        /* 最下部のBack to home */
        footer {
            margin-top: 100px;
            text-align: center;
        }

        .back-link {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: #111;
            text-decoration: none;
            border-bottom: 1px solid #111;
            padding-bottom: 4px;
            transition: opacity 0.3s ease;
            text-transform: uppercase;
        }

        .back-link:hover { opacity: 0.5; }

        /* アニメーションのディレイ設定 */
        .news-item:nth-child(1) { animation-delay: 0.2s; }
        .news-item:nth-child(2) { animation-delay: 0.4s; }
        .news-item:nth-child(3) { animation-delay: 0.6s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* モバイル対応 */
        @media (max-width: 768px) {
            .news-item { display: flex; flex-direction: column; gap: 15px; }
            .news-image { order: -1; margin-bottom: 10px; } /* スマホでは画像を上に */
            header { margin-bottom: 40px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="current-page">NEWS</div>
    </header>

    <main class="news-container">
        <article class="news-item">
            <div class="news-label">Exhibition</div>
            <div class="news-content">
                <p class="news-text">scaL_TONEの新しい展示会シリーズが始まります。建築的な視点から捉えたプロダクトデザインの核心に迫ります。</p>
                <a href="news-detail-01.html" class="learn-more">LEARN MORE</a>
            </div>
            <div class="news-image">
                <img src="news1.jpg" alt="">
            </div>
        </article>

        <article class="news-item">
            <div class="news-label">Workshop</div>
            <div class="news-content">
                <p class="news-text">2024年秋、素材の質感（TONE）を肌で感じる少人数制のワークショップを開催予定です。</p>
                <a href="news-detail-02.html" class="learn-more">LEARN MORE</a>
            </div>
            <div class="news-image">
                <img src="news2.jpg" alt="">
            </div>
        </article>

        <article class="news-item">
            <div class="news-label">Collaboration</div>
            <div class="news-content">
                <p class="news-text">異分野のクリエイターとの共作プロジェクト。境界線を越えることで生まれる新しい価値を提案します。</p>
                <a href="news-detail-03.html" class="learn-more">LEARN MORE</a>
            </div>
            <div class="news-image">
                <img src="news3.jpg" alt="">
            </div>
        </article>
    </main>

    <footer>
        <a href="index.html" class="back-link">Back to home</a>
    </footer>

</body>
</html>
