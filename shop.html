<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP | scaL_TONE</title>
    
    <!-- 外部フォント（モダンなArimo、等幅のAzeret Mono）を読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&family=Azeret+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #ffffff;             /* 背景色：ピュアホワイト */
            --text-primary: #111111;         /* 主要文字：ディープブラック */
            --text-secondary: #555555;       /* 補助文字：ミディアムグレー */
            --text-muted: #888888;           /* 控えめな文字：ライトグレー */
            --border-color: #111111;         /* 境界線：強弱を明確にするための黒線 */
            --font-sans: 'Arimo', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: 'Azeret Mono', monospace;
        }

        /* グローバルリセット */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            font-family: var(--font-sans); 
            padding: 40px 20px 100px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            position: relative;
            opacity: 1;
            /* 0.6s のスムーズなページフェード設定 */
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        
        /* ページ切り替え（標準フェードアウト用クラス） */
        body.page-fade-out {
            opacity: 0 !important;
            transform: translateY(-8px);
        }

        /* 標準仕様：固定・追従型スピンメニューボタン（座標ズレ防止のため独立配置） */
        .menu-trigger {
            position: fixed;
            top: 40px;
            left: max(20px, calc(50% - 600px));
            background: none;
            border: none;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1100; /* スライドサイドバーより前面に維持 */
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* メニュー開閉時のアイコン変化アニメーション（標準スピン＆スケール） */
        .menu-trigger img {
            position: absolute;
            width: 26px;
            height: auto;
            object-fit: contain;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .menu-trigger .icon-default { 
            opacity: 1; 
            transform: rotate(0deg) scale(1); 
        }
        
        .menu-trigger .icon-active { 
            opacity: 0; 
            transform: rotate(-180deg) scale(0.7); 
        }

        .menu-trigger.active .icon-default { 
            opacity: 0; 
            transform: rotate(180deg) scale(0.7); 
        }
        
        .menu-trigger.active .icon-active { 
            opacity: 1; 
            transform: rotate(0deg) scale(1); 
        }

        /* 標準仕様：スライドインサイドバー */
        .sidebar-menu {
            position: fixed; 
            top: 0; 
            left: -260px; 
            width: 240px; 
            height: 100vh;
            background-color: #eaeaea; 
            z-index: 1000; 
            padding: 120px 30px 40px;
            transition: left 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; 
            flex-direction: column; 
            gap: 28px;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.02);
        }
        
        .sidebar-menu.open { 
            left: 0; 
        }

        .sidebar-nav { 
            display: flex; 
            flex-direction: column; 
            gap: 22px; 
        }
        
        .sidebar-item {
            display: flex; 
            align-items: center; 
            gap: 12px; 
            text-decoration: none;
            color: #111111; 
            font-size: 11px; 
            font-weight: 700; 
            letter-spacing: 0.15em;
            text-transform: uppercase; 
            padding: 6px 0; 
            position: relative;
        }
        
        .sidebar-icon-wrapper { 
            width: 24px; 
            height: 24px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0; 
        }
        
        .sidebar-icon { 
            max-width: 16px; 
            max-height: 16px; 
            width: 100%; 
            height: auto; 
            object-fit: contain; 
            opacity: 0.9; 
            transition: transform 0.4s ease;
        }

        .sidebar-item:hover .sidebar-icon {
            transform: scale(1.1);
        }
        
        .sidebar-item.home-link .sidebar-icon { 
            max-width: 22px; 
            max-height: 22px; 
        }

        /* 完全に統一された30px幅・1px厚の極細アンダーライン */
        .sidebar-item::after {
            content: ''; 
            position: absolute; 
            left: 36px; 
            bottom: 0; 
            width: 30px; 
            height: 1px;
            background-color: #111111; 
            opacity: 0; 
            transition: opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .sidebar-item:hover::after, 
        .sidebar-item.active-link::after { 
            opacity: 1; 
        }

        /* メニュー背景のソフトな半透明すりガラスオーバーレイ */
        .menu-backdrop {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            background-color: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(2px);
            z-index: 999; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .menu-backdrop.show { 
            opacity: 1; 
            pointer-events: auto; 
        }

        /* ヘッダーエリア */
        header { 
            max-width: 1200px; 
            margin: 0 auto 80px; 
            display: flex; 
            justify-content: flex-end; 
            align-items: center;
            width: 100%;
            z-index: 100;
        }
        
        .current-page { 
            font-size: 10px; 
            letter-spacing: 0.2em; 
            font-weight: 700; 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 4px; 
            text-transform: uppercase;
            font-family: var(--font-mono);
        }

        /* SHOP 3カラムグリッドコンテナ */
        .shop-container { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 20px; 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 45px 0; 
            border-top: 1px solid #eeeeee; 
            width: 100%;
            opacity: 0;
            animation: fadeInPage 1.2s ease-out forwards;
            align-items: center; 
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        /* 左カラム：セクションラベル */
        .shop-label { 
            grid-column: 1 / 3; 
            font-size: 10px; 
            letter-spacing: 0.1em; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            font-weight: 500;
            font-family: var(--font-mono);
            align-self: start; 
        }
        
        /* 中央カラム：コンテンツ（COMING SOON） */
        .shop-content { 
            grid-column: 3 / 8; 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
        }
        
        .shop-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: #111111;
        }

        .shop-text {
            font-size: 14px;
            line-height: 2.0;
            letter-spacing: 0.05em;
            color: #333333;
        }

        /* 右カラム：ショップイメージ画像エリア */
        .shop-image {
            grid-column: 8 / 13;
            overflow: hidden;
            display: flex;
            align-items: center; 
            justify-content: center;
            max-height: 280px; 
        }

        .shop-image img {
            width: 100%;
            height: 100%;
            max-height: 280px; 
            object-fit: contain; 
            display: block;
            filter: grayscale(100%);
            transition: filter 0.5s ease;
        }

        .shop-image img:hover {
            filter: grayscale(0%);
        }
        
        /* フッターエリア */
        footer {
            margin-top: 100px;
            text-align: center;
            width: 100%;
            z-index: 10;
        }

        /* リファレンス画像（BACK TO HOME）に忠実なタイポグラフィ仕様 */
        .back-link {
            display: inline-block;
            font-size: 10px;
            letter-spacing: 0.28em; /* 広い文字間隔 */
            color: var(--text-primary);
            text-decoration: none;
            border-bottom: 1px solid var(--text-primary);
            padding-bottom: 6px;   /* 下線との絶妙な余白 */
            transition: opacity 0.3s ease;
            text-transform: uppercase;
            font-family: var(--font-mono);
            font-weight: 400;     /* 繊細で美しく揃えられた太さ */
            position: relative;
        }

        .back-link::before {
            content: '';
            position: absolute;
            top: -15px;
            bottom: -15px;
            left: -25px;
            right: -25px;
        }
        
        .back-link:hover {
            opacity: 0.5;
        }
        
        /* フェードインアニメーション */
        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* モバイル対応 */
        @media (max-width: 768px) { 
            .shop-container { 
                display: flex; 
                flex-direction: column; 
                gap: 30px;
            } 
            .shop-label {
                margin-bottom: 10px;
            }
            .shop-image {
                margin-top: 20px;
                order: -1; 
                max-height: none;
            }
            .shop-image img {
                max-height: 300px;
            }
        }
    </style>
</head>
<body>

    <!-- メニュー展開用のすりガラスオーバーレイ暗幕 -->
    <div class="menu-backdrop" id="menu-backdrop"></div>

    <!-- 極上仕様：固定・追従型スピンメニューボタン（座標ズレを防止するため独立配置） -->
    <button class="menu-trigger" id="menu-trigger" aria-label="Menu">
        <img src="assets/menu1.png" alt="Open Menu" class="icon-default" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=M1';">
        <img src="assets/menu2.png" alt="Close Menu" class="icon-active" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=M2';">
    </button>

    <!-- ヘッダーエリア -->
    <header>
        <div class="current-page">SHOP</div>
    </header>

    <!-- 標準仕様：スライドイン・サイドバー -->
    <aside class="sidebar-menu" id="sidebar-menu">
        <nav class="sidebar-nav">
            <!-- HOME リンク -->
            <a href="index.html" class="sidebar-item home-link">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="assets/logo3.png" onerror="this.src='https://placehold.co/22x22/111111/ffffff?text=H';" alt="">
                </div>
                HOME
            </a>
            <!-- ABOUT リンク -->
            <a href="about.html" class="sidebar-item">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="assets/about2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=A';" alt="">
                </div>
                ABOUT
            </a>
            <!-- SHOP リンク（アクティブ） -->
            <a href="shop.html" class="sidebar-item active-link">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="assets/shop2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=S';" alt="">
                </div>
                SHOP
            </a>
            <!-- NEWS リンク -->
            <a href="news.html" class="sidebar-item">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="assets/news2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=N';" alt="">
                </div>
                NEWS
            </a>
            <!-- WORKS リンク -->
            <a href="works.html" class="sidebar-item">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="assets/work2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=W';" alt="">
                </div>
                WORKS
            </a>
            <!-- CONTACT リンク -->
            <a href="contact.html" class="sidebar-item">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="assets/contact2.png" onerror="this.src='https://placehold.co/16x16/111111/ffffff?text=C';" alt="">
                </div>
                CONTACT
            </a>
        </nav>
    </aside>

    <!-- メインコンテンツ -->
    <main>
        <div class="shop-container" id="main-content">
            <div class="shop-label">Status</div>
            
            <div class="shop-content">
                <h2 class="shop-title">COMING SOON</h2>
                <p class="shop-text">
                    オンラインストアは現在準備中です。<br>
                    scaL_TONEが手掛けるプロダクトを、ここから皆様の日常にお届けできるようになります。<br>
                    公開まで今しばらくお待ちください。
                </p>
            </div>

            <div class="shop-image">
                <img src="assets/logo2.png" alt="scaL_TONE Shop" onerror="this.style.display='none';">
            </div>
        </div>
    </main>

    <!-- フッター -->
    <footer>
        <a href="index.html" class="back-link">BACK TO HOME</a>
    </footer>

    <!-- アプリケーション制御ロジック（標準仕様） -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const trigger = document.getElementById('menu-trigger');
            const menu = document.getElementById('sidebar-menu');
            const backdrop = document.getElementById('menu-backdrop');
            const mainContent = document.getElementById('main-content');

            // メニュー開閉処理
            function toggleMenu() {
                const isOpen = menu.classList.toggle('open');
                trigger.classList.toggle('active');
                backdrop.classList.toggle('show');

                if (isOpen) {
                    document.body.style.overflow = 'hidden'; // 背景スクロール禁止
                    if (window.innerWidth > 1024) {
                        mainContent.style.transform = 'translateX(60px)'; // 右シフト
                    }
                } else {
                    document.body.style.overflow = '';
                    mainContent.style.transform = 'translateX(0)';
                }
            }

            // イベント登録
            trigger.addEventListener('click', toggleMenu);
            backdrop.addEventListener('click', toggleMenu);

            // ページ遷移イージング（600ms フェードアウト）
            const transitLinks = document.querySelectorAll('.sidebar-item, .back-link');
            transitLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    const targetUrl = this.getAttribute('href');
                    if (targetUrl && targetUrl !== '#' && !targetUrl.startsWith('javascript:')) {
                        e.preventDefault();
                        
                        menu.classList.remove('open');
                        trigger.classList.remove('active');
                        backdrop.classList.remove('show');
                        mainContent.style.transform = 'translateX(0)';
                        document.body.style.overflow = '';
                        
                        document.body.classList.add('page-fade-out');
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 600); 
                    }
                });
            });
        });
    </script>
</body>
</html>
