<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP | scaL_TONE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #ffffff; 
            color: #111111; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 40px 20px 100px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        /* 1. 右上のページ表示（他ページと完全統一） */
        header { 
            max-width: 1200px; 
            margin: 0 auto 80px; 
            display: flex; 
            justify-content: flex-end; 
            width: 100%;
        }
        
        .current-page { 
            font-size: 10px; 
            letter-spacing: 0.2em; 
            font-weight: 700; 
            border-bottom: 1px solid #111111; 
            padding-bottom: 4px; 
            text-transform: uppercase;
        }
        
        /* 2. 3カラムグリッドコンテナ（他ページと完全同一幅・余白） */
        .shop-container { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 20px; 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 45px 0; 
            border-top: 1px solid #eeeeee; 
            width: 100%;
            opacity: 0;
            animation: fadeInPage 1.2s ease-out forwards;
        }
        
        /* 左カラム：セクションラベル */
        .shop-label { 
            grid-column: 1 / 3; 
            font-size: 10px; 
            letter-spacing: 0.1em; 
            color: #888888; 
            text-transform: uppercase; 
            font-weight: 500;
        }
        
        /* 中央カラム：コンテンツ（COMING SOON） */
        .shop-content { 
            grid-column: 3 / 8; 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
        }
        
        .shop-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: #111111;
        }

        .shop-text {
            font-size: 14px;
            line-height: 2.0;
            letter-spacing: 0.05em;
            color: #333333;
        }

        /* 右カラム：ショップイメージ画像エリア（小文字 assets から参照） */
        .shop-image {
            grid-column: 8 / 13;
            overflow: hidden;
            display: flex;
            align-items: flex-start;
        }

        .shop-image img {
            width: 100%;
            height: auto;
            display: block;
            filter: grayscale(100%); /* モノクロにしてサイト全体と統一 */
            transition: filter 0.5s ease;
        }

        .shop-image img:hover {
            filter: grayscale(0%);
        }
