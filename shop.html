<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOP | scaL_TONE</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body { 
            background-color: #ffffff; 
            color: #111111; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 40px 20px 100px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        /* 1. 右上のページ表示（他ページと完全統一） */
        header { 
            max-width: 1200px; 
            margin: 0 auto 80px; 
            display: flex; 
            justify-content: flex-end; 
            width: 100%;
        }
        
        .current-page { 
            font-size: 10px; 
            letter-spacing: 0.2em; 
            font-weight: 700; 
            border-bottom: 1px solid #111111; 
            padding-bottom: 4px; 
            text-transform: uppercase;
        }
        
        /* 2. 3カラムグリッドコンテナ */
        .shop-container { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 20px; 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 45px 0; 
            border-top: 1px solid #eeeeee; 
            width: 100%;
            /* 安全対策：標準で表示状態にしておき、アニメーションを上から重ねます */
            animation: fadeInPage 0.8s ease-out;
        }
        
        /* 左カラム：セクションラベル */
        .shop-label { 
            grid-column: 1 / 3; 
            font-size: 10px; 
            letter-spacing: 0.1em; 
            color: #888888; 
            text-transform: uppercase; 
            font-weight: 500;
        }
        
        /* 中央カラム：コンテンツ（COMING SOON） */
        .shop-content { 
            grid-column: 3 / 8; 
            display: flex; 
            flex-direction: column; 
            gap: 24px; 
        }
        
        .shop-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: #111111;
        }

        .shop-text {
            font-size: 14px;
            line-height: 2.0;
            letter-spacing: 0.05em;
            color: #333333;
        }

        /* 右カラム：ショップイメージ画像エリア */
        .shop-image {
            grid-column: 8 / 13;
            overflow: hidden;
            display: flex;
            align-items: flex-start;
        }

        .shop-image img {
            width: 100%;
            height: auto;
            display: block;
            filter: grayscale(100%);
            transition: filter 0.5s ease;
        }

        .shop-image img:hover {
            filter: grayscale(0%);
        }
        
        /* 3. 最下部のBack to home（他ページと完全統一） */
        footer {
            margin-top: 100px;
            text-align: center;
            width: 100%;
        }

        .back-link {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: #111111;
            text-decoration: none;
            border-bottom: 1px solid #111111;
            padding-bottom: 4px;
            transition: opacity 0.3s ease;
            text-transform: uppercase;
        }
        
        .back-link:hover {
            opacity: 0.5;
        }
        
        /* フェードインアニメーション（初期状態を隠さない安全設計） */
        @keyframes fadeInPage {
            0% { opacity: 0; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* モバイル対応 */
        @media (max-width: 768px) { 
            .shop-container { 
                display: flex; 
                flex-direction: column; 
                gap: 30px;
            } 
            .shop-label {
                margin-bottom: 10px;
            }
            .shop-image {
                margin-top: 20px;
                order: -1;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="current-page">SHOP</div>
    </header>

    <main>
        <div class="shop-container">
            <div class="shop-label">Status</div>
            
            <div class="shop-content">
                <h2 class="shop-title">COMING SOON</h2>
                <p class="shop-text">
                    オンラインストアは現在準備中です。<br>
                    scaL_TONEが手掛けるプロダクトを、ここから皆様の日常にお届けできるようになります。<br>
                    公開まで今しばらくお待ちください。
                </p>
            </div>

            <div class="shop-image">
                <img src="/assets/shop_main.png" alt="scaL_TONE Shop" onerror="this.style.display='none';">
            </div>
        </div>
    </main>

    <footer>
        <a href="index.html" class="back-link">Back to home</a>
    </footer>

</body>
</html>
