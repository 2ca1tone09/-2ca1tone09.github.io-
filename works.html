<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORKS | scaL_TONE</title>
    
    <!-- 外部フォント（モダンなArimo、等幅のAzeret Mono）を読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&family=Azeret+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #ffffff;             /* 背景色：ピュアホワイト */
            --text-primary: #111111;         /* 主要文字：ディープブラック */
            --text-secondary: #555555;       /* 補助文字：ミディアムグレー */
            --text-muted: #888888;           /* 控えめな文字：ライトグレー */
            --border-color: #111111;         /* 境界線：強弱を明確にするための黒線 */
            --font-sans: 'Arimo', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: 'Azeret Mono', monospace;
        }

        /* グローバルリセット */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            font-family: var(--font-sans); 
            padding: 40px 20px 100px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
            opacity: 1;
            /* ページ表示時の滑らかなフェードイン設定（0.6s） */
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        
        /* ページ切り替え（フェードアウト用クラス） */
        body.page-fade-out {
            opacity: 0 !important;
            transform: translateY(-8px);
        }

        /* 標準仕様：極上レスポンシブ固定メニューボタン */
        .menu-trigger {
            position: fixed;
            top: 40px;
            left: max(20px, calc(50% - 600px));
            background: none;
            border: none;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1100; /* スライドサイドバーより前面に維持 */
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* メニュー開閉時のアイコン変化アニメーション */
        .menu-trigger img {
            position: absolute;
            width: 26px;
            height: auto;
            object-fit: contain;
            /* 0.6s イージング transition */
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .menu-trigger .icon-default { 
            opacity: 1; 
            transform: rotate(0deg) scale(1); 
        }
        
        .menu-trigger .icon-active { 
            opacity: 0; 
            transform: rotate(-180deg) scale(0.7); 
        }

        /* メニュー展開中（アクティブ時） */
        .menu-trigger.active .icon-default { 
            opacity: 0; 
            transform: rotate(180deg) scale(0.7); 
        }
        
        .menu-trigger.active .icon-active { 
            opacity: 1; 
            transform: rotate(0deg) scale(1); 
        }

        /* 標準仕様：スライドインサイドバー（幅240px、初期状態は左側画面外に配置） */
        .sidebar-menu {
            position: fixed; 
            top: 0; 
            left: -260px; 
            width: 240px; 
            height: 100vh;
            background-color: #eaeaea; 
            z-index: 1000; 
            padding: 120px 30px 40px;
            /* 0.6s のスムーズなイージング展開 */
            transition: left 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; 
            flex-direction: column; 
            gap: 28px; /* 完全統一仕様 */
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.02);
        }
        
        .sidebar-menu.open { 
            left: 0; 
        }

        /* サイドバー最上部のシンボル */
        .sidebar-logo {
            margin-bottom: 12px;
            display: flex;
            justify-content: flex-start;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .sidebar-logo:hover {
            opacity: 0.5;
        }

        .sidebar-logo img {
            width: 32px;
            height: auto;
            object-fit: contain;
        }
        
        /* サイドバーナビゲーション */
        .sidebar-nav { 
            display: flex; 
            flex-direction: column; 
            gap: 22px; /* 完全統一仕様 */
        }
        
        .sidebar-item {
            display: flex; 
            align-items: center; 
            gap: 12px; 
            text-decoration: none;
            color: #111111; 
            font-size: 11px; 
            font-weight: 700; 
            letter-spacing: 0.15em;
            text-transform: uppercase; 
            padding: 6px 0; 
            position: relative;
        }
        
        /* アイコン用ラッパー */
        .sidebar-icon-wrapper { 
            width: 24px; 
            height: 24px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0; 
        }
        
        /* アイコンアセット */
        .sidebar-icon { 
            max-width: 16px; 
            max-height: 16px; 
            width: 100%; 
            height: auto; 
            object-fit: contain; 
            opacity: 0.9; 
            transition: transform 0.4s ease; /* 完全統一仕様: ホバーアニメーションの準備 */
        }

        .sidebar-item:hover .sidebar-icon {
            transform: scale(1.1); /* 完全統一仕様: ホバー時の上品な拡大 */
        }
        
        /* HOMEリンク用拡張 */
        .sidebar-item.home-link .sidebar-icon { 
            max-width: 22px; 
            max-height: 22px; 
        }

        /* 完全に統一された30px幅・1px厚の極細アンダーライン */
        .sidebar-item::after {
            content: ''; 
            position: absolute; 
            left: 36px; 
            bottom: 0; 
            width: 30px; 
            height: 1px;
            background-color: #111111; 
            opacity: 0; 
            /* 0.3s の心地よいフェードイージング */
            transition: opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .sidebar-item:hover::after, 
        .sidebar-item.active-link::after { 
            opacity: 1; 
        }

        /* メニュー背景のソフトな半透明すりガラスオーバーレイ */
        .menu-backdrop {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            background-color: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(2px);
            z-index: 999; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1); /* 完全統一仕様 */
        }
        
        .menu-backdrop.show { 
            opacity: 1; 
            pointer-events: auto; 
        }

        /* ヘッダーエリア */
        header { 
            max-width: 1200px; 
            margin: 0 auto 60px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            width: 100%;
            z-index: 100;
        }

        /* カテゴリフィルター */
        .filters-container {
            display: flex;
            gap: 20px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            margin-left: 60px; /* メニューボタンとの干渉を防ぐ間隔 */
        }

        /* ミニマルなテキストリンク風ボタン */
        .filter-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            text-transform: uppercase;
            padding-bottom: 2px;
            border-bottom: 1px solid transparent;
            transition: color 0.3s ease, border-color 0.3s ease;
            outline: none;
        }

        .filter-btn.active, .filter-btn:hover {
            color: var(--text-primary);
            border-color: var(--border-color);
        }
        
        /* 現在地表記 */
        .current-page { 
            font-size: 10px; 
            letter-spacing: 0.2em; 
            font-weight: 700; 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 4px; 
            text-transform: uppercase;
            font-family: var(--font-mono);
        }

        /* 12カラム構造のWORKSグリッドシステム */
        .works-grid { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 20px 0; 
            width: 100%;
            /* メニュー展開時にコンテンツがエレガントにシフトする挙動（0.6sイージング） */
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        /* 作品アイテム枠（上部を極細の線で区切る知的なデザイン） */
        .work-item { 
            position: relative; 
            text-decoration: none; 
            display: block; 
            margin-bottom: 140px; 
            border-top: 1px solid var(--text-primary); 
            padding-top: 25px; 
            opacity: 0;
            transform: translateY(20px);
            /* 優雅な浮き上がりトランジション設定 */
            transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 1.2s cubic-bezier(0.25, 1, 0.5, 1),
                        border-color 0.4s ease;
        }

        /* 段階的アニメーション適用時 */
        .work-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* フィルターアウト状態（他カテゴリを美しく非表示化） */
        .work-item.filtered-out {
            opacity: 0 !important;
            transform: scale(0.95) translateY(10px) !important;
            pointer-events: none;
            position: absolute;
            width: 0;
            height: 0;
            overflow: hidden;
            margin: 0;
            padding: 0;
            border: none;
        }
        
        /* 各作品の見出しラベル */
        .work-label { 
            position: absolute;
            top: -1px; 
            transform: translateY(-100%); 
            display: block; 
            font-size: 10px; 
            letter-spacing: 0.15em; 
            color: var(--text-primary); 
            padding-bottom: 6px; 
            font-weight: 500; 
            text-transform: uppercase; 
            font-family: var(--font-mono);
        }
        
        /* マスクボックス */
        .image-box { 
            overflow: hidden; 
            background-color: #fafafa;
            position: relative;
        }
        
        /* 作品イメージ（通常はモノクロ、ホバーでカラーに変化しながら拡大） */
        .image-box img { 
            width: 100%; 
            height: auto; 
            display: block; 
            filter: grayscale(100%); 
            transition: filter 0.8s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* ホバー時の洗練された「＋」マーク */
        .image-box::before {
            content: '+';
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: var(--font-mono);
            font-size: 18px;
            color: #ffffff;
            background-color: var(--text-primary);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 2;
            pointer-events: none;
        }
        
        .work-item:hover img, 
        .work-item:active img { 
            filter: grayscale(0%); 
            transform: scale(1.03); 
        }

        .work-item:hover .image-box::before {
            opacity: 1;
            transform: scale(1);
        }

        .work-item:hover {
            border-color: var(--text-secondary);
        }
        
        /* ポートフォリオセクション（中央部を贅沢に使用） */
        .portfolio-item {
            grid-column: 3 / 11 !important; 
            margin-top: 100px !important;
            margin-bottom: 20px !important;
            border-top: 1px solid var(--text-muted); 
        }

        .portfolio-item .work-label {
            color: var(--text-muted); 
        }
        
        /* フッターエリア */
        footer {
            margin-top: 60px;
            text-align: center;
            width: 100%;
        }

        /* ホームへ戻るリンク */
        .back-link {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--text-primary);
            text-decoration: none;
            border-bottom: 1px solid var(--text-primary);
            padding-bottom: 4px;
            transition: opacity 0.3s ease;
            text-transform: uppercase;
            font-family: var(--font-mono);
            font-weight: 700;
            position: relative;
        }

        /* クリック可能な当たり判定領域の拡張 */
        .back-link::before {
            content: '';
            position: absolute;
            top: -15px;
            bottom: -15px;
            left: -25px;
            right: -25px;
        }
        
        .back-link:hover {
            opacity: 0.5;
        }
        
        /* レスポンシブ：タブレットクラス（中画面） */
        @media (max-width: 1024px) {
            .filters-container {
                margin-left: 45px;
                gap: 12px;
            }
        }

        /* レスポンシブ：スマートフォンクラス（1カラムレイアウトに再構成） */
        @media (max-width: 768px) { 
            header {
                flex-direction: column-reverse;
                align-items: flex-end;
                gap: 20px;
                margin-bottom: 40px;
            }
            .filters-container {
                margin-left: 0;
                width: 100%;
                justify-content: flex-start;
                overflow-x: auto; /* スマホ画面ではみ出た際にスクロール可能に */
                padding-bottom: 8px;
                scrollbar-width: none; /* Firefox用スクロールバー非表示 */
            }
            .filters-container::-webkit-scrollbar {
                display: none; /* Chrome / Safari用スクロールバー非表示 */
            }
            .works-grid { 
                display: flex;
                flex-direction: column;
                gap: 70px; /* 均一で見やすい縦間隔 */
            } 
            .work-item {
                width: 100% !important;
                margin-top: 0 !important;
                margin-bottom: 20px !important;
                transform: none !important; /* PC用の非対称オフセット設定をキャンセル */
                border-top: 1px solid #eeeeee;
            }
            .work-label {
                position: static;
                transform: none;
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- メニュー展開用のすりガラスオーバーレイ暗幕 -->
    <div class="menu-backdrop" id="menu-backdrop"></div>

    <!-- 極上仕様：固定・追従型スピンメニューボタン（座標ズレを防止するため独立配置） -->
    <button class="menu-trigger" id="menu-trigger" aria-label="Menu">
        <img src="assets/menu1.png" alt="Open Menu" class="icon-default" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=M1';">

    <!-- ヘッダーエリア -->
    <header>

            <button class="filter-btn active" data-filter="all">All</button>

    <!-- アプリケーション制御ロジック -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const trigger = document.getElementById('menu-trigger');
            const menu = document.getElementById('sidebar-menu');
            const backdrop = document.getElementById('menu-backdrop');
            const grid = document.getElementById('works-grid');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const allItems = Array.from(grid.querySelectorAll('.work-item'));
            const sidebarLogo = menu.querySelector('.sidebar-logo');

            // メニュー展開時の処理
            function toggleMenu() {
                const isOpen = menu.classList.toggle('open');
                trigger.classList.toggle('active');
                backdrop.classList.toggle('show');

                if (isOpen) {
                    document.body.style.overflow = 'hidden'; // 背後のスクロールを完全に抑止
                    if (window.innerWidth > 1024) { 
                        grid.style.transform = 'translateX(60px)'; // 優雅な右シフト
                    }
                } else {
                    document.body.style.overflow = '';
                    grid.style.transform = 'translateX(0)'; // シフト解除
                }
            }

            // イベントバインド
            trigger.addEventListener('click', toggleMenu);
            backdrop.addEventListener('click', toggleMenu);
            if (sidebarLogo) {
                sidebarLogo.addEventListener('click', toggleMenu);
            }

            // ページ遷移イージング
            const transitLinks = document.querySelectorAll('.sidebar-item, .back-link, .work-item');
            transitLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    const targetUrl = this.getAttribute('href');
                    if (targetUrl && targetUrl !== '#' && !targetUrl.startsWith('javascript:')) {
                        e.preventDefault(); 
                        
                        // メニュー状態をリセット
                        menu.classList.remove('open');
                        trigger.classList.remove('active');
                        backdrop.classList.remove('show');
                        grid.style.transform = 'translateX(0)';
                        document.body.style.overflow = '';
                        
                        // project1基準：600ミリ秒のフェードアウト遅延の後に安全に遷移
                        document.body.classList.add('page-fade-out');
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 600); 
                    }
                });
            });

            // 黄金比率に基づいた非対称エディトリアルレイアウトエンジン
            const layoutPatterns = [
                { gridColumn: '2 / 7', marginTop: '0px' },    /* パターンA：左寄 */
                { gridColumn: '8 / 12', marginTop: '-60px' },  /* パターンB：右寄・上部食い込み */
                { gridColumn: '4 / 10', marginTop: '70px' }    /* パターンC：中央・深い空白 */
            ];

            function applyAsymmetricLayout() {
                if (window.innerWidth <= 768) {
                    allItems.forEach(item => {
                        item.style.gridColumn = '';
                        item.style.marginTop = '';
                    });
                    return;
                }

                // フィルターで非表示になっていない要素（visible）に対してのみ不規則にパターンを再適用
                const visibleItems = allItems.filter(item => !item.classList.contains('filtered-out'));
                visibleItems.forEach((item, index) => {
                    if (item.classList.contains('portfolio-item')) {
                        item.style.gridColumn = '3 / 11';
                        item.style.marginTop = '100px';
                    } else {
                        const pattern = layoutPatterns[index % layoutPatterns.length];
                        item.style.gridColumn = pattern.gridColumn;
                        item.style.marginTop = pattern.marginTop;
                    }
                });
            }

            // カテゴリフィルタリング＆段階的ロードアニメーション（スタッガー現象）
            filterBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    const selectedFilter = this.getAttribute('data-filter');

                    allItems.forEach(item => {
                        const category = item.getAttribute('data-category');
                        if (selectedFilter === 'all' || category === selectedFilter) {
                            item.classList.remove('filtered-out');
                        } else {
                            item.classList.add('filtered-out');
                        }
                    });

                    applyAsymmetricLayout();
                    triggerStaggeredFadeIn();
                });
            });

            // 120ms間隔で遅延させて「visible」クラスを付与するスタッガーアニメーション
            function triggerStaggeredFadeIn() {
                const visibleItems = allItems.filter(item => !item.classList.contains('filtered-out'));
                visibleItems.forEach(item => item.classList.remove('visible')); 
                
                visibleItems.forEach((item, index) => {
                    setTimeout(() => {
                        item.classList.add('visible');
                    }, index * 120);
                });
            }

            // 初期ロード処理
            applyAsymmetricLayout();
            triggerStaggeredFadeIn();

            window.addEventListener('resize', applyAsymmetricLayout);
        });
    </script>
</body>
</html>
