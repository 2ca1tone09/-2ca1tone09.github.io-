<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORKS | scaL_TONE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #ffffff; 
            color: #111111; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 40px 20px 100px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        /* 1. 右上のページ表示（他ページと完全統一） */
        header { 
            max-width: 1200px; 
            margin: 0 auto 80px; 
            display: flex; 
            justify-content: flex-end; 
            width: 100%;
        }
        
        .current-page { 
            font-size: 10px; 
            letter-spacing: 0.2em; 
            font-weight: 700; 
            border-bottom: 1px solid #111111; 
            padding-bottom: 4px; 
            text-transform: uppercase;
        }
        
        /* 2. 12カラムギャラリーのグリッドコンテナ */
        .works-grid { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 45px 0; 
            width: 100%;
        }
        
        /* 3. 各ワークアイテムの共通設計（参考画像の境界線グリッドを再現） */
        .work-item { 
            position: relative; 
            text-decoration: none; 
            display: block; 
            margin-bottom: 140px; /* 余白をより贅沢に広げて緊張感を持たせる */
            border-top: 1px solid #111111; /* アイテム幅に同期する美しい水平境界線 */
            padding-top: 25px; /* 線と画像の間の余白 */
            
            /* ロード時の滑らかな順番フェードインのための初期状態 */
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), 
                        transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* フェードイン表示クラス */
        .work-item.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* ラベル（参考画像のように線の上に直接乗るように精密配置） */
        .work-label { 
            position: absolute;
            top: -1px; /* 境界線の真上に乗せる */
            transform: translateY(-100%); /* 線より上へ逃がす */
            display: block; 
            font-size: 10px; 
            letter-spacing: 0.15em; 
            color: #111111; 
            padding-bottom: 6px; 
            font-weight: 500; 
            text-transform: uppercase; 
            transition: opacity 0.3s ease;
        }
        
        /* 画像ボックス（枠線を完全に廃止し、アートブックのモノクロカットのような佇まいに） */
        .image-box { 
            overflow: hidden; 
            background-color: #fafafa;
        }
        
        .image-box img { 
            width: 100%; 
            height: auto; 
            display: block; 
            filter: grayscale(100%); 
            transition: filter 0.8s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        /* ホバーインタラクション */
        .work-item:hover img, .work-item:active img { 
            filter: grayscale(0%); 
            transform: scale(1.03); 
        }

        /* ホバー時に境界線の存在感を少し高める、あるいは変化させる繊細な演出 */
        .work-item {
            transition: border-color 0.4s ease;
        }
        .work-item:hover {
            border-color: #888888;
        }
        
        /* 建築学生時代の課題・ポートフォリオ用の特別な固定スタイル */
        .portfolio-item {
            grid-column: 3 / 11 !important; 
            margin-top: 100px !important;
            margin-bottom: 20px !important;
            border-top: 1px solid #888888; /* ポートフォリオは少しトーンを落とした細いグレー線 */
        }

        .portfolio-item .work-label {
            color: #888888; 
        }
        
        /* 4. 最下部のBack to home（他ページと完全統一） */
        footer {
            margin-top: 60px;
            text-align: center;
            width: 100%;
        }

        .back-link {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: #111111;
            text-decoration: none;
            border-bottom: 1px solid #111111;
            padding-bottom: 4px;
            transition: opacity 0.3s ease;
            text-transform: uppercase;
        }
        
        .back-link:hover {
            opacity: 0.5;
        }
        
        /* モバイル対応：自動的にグリッドをリセットして読みやすい縦スクロールに変更 */
        @media (max-width: 768px) { 
            .works-grid { 
                display: flex;
                flex-direction: column;
                gap: 70px;
            } 
            .work-item {
                width: 100% !important;
                margin-top: 0 !important;
                margin-bottom: 20px !important;
                transform: none !important;
                border-top: 1px solid #eeeeee;
            }
            .work-label {
                position: static;
                transform: none;
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- ヘッダー：他ページと完全共通 -->
    <header>
        <div class="current-page">WORKS</div>
    </header>

    <!-- メイン：作品グリッドエリア -->
    <main class="works-grid" id="works-grid">

        <!-- ==========================================
             ▼ ここから通常プロジェクト（追加用フォーマット）
             新しい作品を増やしたい場合は、以下のブロックをコピペして増やすだけで
             配置は完全に自動（非対称＆ズレ）で構築されます。
             ========================================== -->

        <a href="project1.html" class="work-item">
            <span class="work-label">Project No.01</span>
            <div class="image-box">
                <img src="/assets/p1.png" alt="">
            </div>
        </a>

        <a href="project2.html" class="work-item">
            <span class="work-label">Creative Work 02</span>
            <div class="image-box">
                <img src="/assets/P2.jpg" alt="">
            </div>
        </a>

        <a href="project3.html" class="work-item">
            <span class="work-label">Design Study 03</span>
            <div class="image-box">
                <img src="/assets/p3.png" alt="">
            </div>
        </a>

        <!-- ここにコピペするだけで作品が自動調整されて増えていきます -->

        <!-- ==========================================
             ▲ 通常プロジェクトエリア終わり
             ========================================== -->


        <!-- ==========================================
             ★ 建築学生時代の課題・ポートフォリオ（常に最下部に美しく固定されます）
             ========================================== -->
        <a href="portfolio.html" class="work-item portfolio-item">
            <span class="work-label">Architectural Portfolio</span>
            <div class="image-box">
                <!-- assetsフォルダから読み込みます。画像がない場合も logo2.png が自動代替される設計です -->
                <img src="/assets/portfolio_main.png" alt="Student Portfolio" onerror="this.src='/assets/logo2.png'">
            </div>
        </a>

    </main>

    <!-- フッター：他ページと完全共通 -->
    <footer>
        <a href="index.html" class="back-link">Back to home</a>
    </footer>

    <!-- ランダム自動レイアウト ＆ シーケンシャルフェードインエンジン -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('works-grid');
            // 通常のアイテムをすべて取得（ポートフォリオアイテムは除く）
            const items = Array.from(grid.querySelectorAll('.work-item:not(.portfolio-item)'));
            const portfolioItem = grid.querySelector('.portfolio-item');

            // 【画像縮小・段違いグリッド】参考画像の、線の美しさとアシンメトリーが極大化するパターン
            const layoutPatterns = [
                { gridColumn: '2 / 7', marginTop: '0px' },       // パターンA: 5カラム（やや左、1カラム空け）
                { gridColumn: '8 / 12', marginTop: '-60px' },    // パターンB: 4カラム（右寄せ、線と高さが隣と大胆にズレる）
                { gridColumn: '4 / 10', marginTop: '70px' },     // パターンC: 6カラム（中央、上下に贅沢な空白を発生させる）
                { gridColumn: '2 / 6', marginTop: '10px' },      // パターンD: 4カラム（小さく上品に）
                { gridColumn: '7 / 12', marginTop: '-30px' },    // パターンE: 5カラム（右寄り）
                { gridColumn: '5 / 9', marginTop: '80px' },      // パターンF: 4カラム（完全に中寄せして左右に広大なホワイトスペース）
                { gridColumn: '3 / 8', marginTop: '20px' },      // パターンG: 5カラム
                { gridColumn: '9 / 12', marginTop: '-40px' }     // パターンH: 3カラム（右端に極めてコンパクトに配置、余白を増幅）
            ];

            // パターン配列をランダムにシャッフルするアルゴリズム
            function shuffle(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            // ロード毎にパターンの組み合わせをシャッフル
            const randomizedPatterns = shuffle([...layoutPatterns]);

            // 各アイテムにスタイルを適用（パターンの数がアイテムより少なくてもループして繰り返します）
            items.forEach((item, index) => {
                const pattern = randomizedPatterns[index % randomizedPatterns.length];
                
                // 横幅の広さやズレをインラインスタイルで動的に注入
                item.style.gridColumn = pattern.gridColumn;
                item.style.marginTop = pattern.marginTop;
            });

            // すべてのアイテム（ポートフォリオを含む）を順番に滑らかにフェードイン
            const allItems = [...items, portfolioItem];
            allItems.forEach((item, index) => {
                if (item) {
                    setTimeout(() => {
                        item.classList.add('visible');
                    }, index * 180); // 180msで小気味よくウェーブするように展開
                }
            });
        });
    </script>
</body>
</html>
