<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORKS | scaL_TONE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #ffffff;
            color: #111111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 80px 40px;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 100px;
            text-align: right;
        }

        .site-title {
            font-size: 12px;
            letter-spacing: 0.2em;
            font-weight: 700;
            text-decoration: none;
            color: #111;
        }

        /* ギャラリーのグリッド設定 */
        .works-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .work-item {
            position: relative;
            text-decoration: none;
            display: block;
            margin-bottom: 80px;
        }

        /* プロジェクト名（ラベル） */
        .work-label {
            display: block;
            font-size: 11px;
            letter-spacing: 0.1em;
            color: #111;
            margin-bottom: 15px;
            font-weight: 500;
        }

        /* 画像コンテナ */
        .image-container {
            overflow: hidden;
            background-color: #f0f0f0;
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
            /* 最初はモノクロ */
            filter: grayscale(100%);
            transition: filter 0.6s ease, transform 0.6s ease;
        }

        /* ホバー・タップ時の変化 */
        .work-item:hover img, .work-item:active img {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        /* --- 非対称グリッドの配置（サンプルの位置指定） --- */
        /* 作品1: 左側・大きめ */
        .work1 { grid-column: 1 / 7; }
        /* 作品2: 右上・小さめ・少し上に */
        .work2 { grid-column: 8 / 12; margin-top: -40px; }
        /* 作品3: 中央・横長 */
        .work3 { grid-column: 4 / 10; margin-top: 40px; }
        /* 作品4: 右側・縦長 */
        .work4 { grid-column: 7 / 13; margin-top: -20px; }

        @media (max-width: 768px) {
            .works-grid { display: block; }
            .work-item { margin-top: 0 !important; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="site-title">scaL_TONE</a>
    </header>

    <main class="works-grid">
        <a href="project1.html" class="work-item work1">
            <span class="work-label">PROJECT NAME 01</span>
            <div class="image-container">
                <img src="project1.jpg" alt="">
            </div>
        </a>

        <a href="project2.html" class="work-item work2">
            <span class="work-label">CREATIVE PIECE 02</span>
            <div class="image-container">
                <img src="project2.jpg" alt="">
            </div>
        </a>

        <a href="project3.html" class="work-item work3">
            <span class="work-label">ABSTRACT STUDY 03</span>
            <div class="image-container">
                <img src="project3.jpg" alt="">
            </div>
        </a>

        <a href="project4.html" class="work-item work4">
            <span class="work-label">VISUAL LOG 04</span>
            <div class="image-container">
                <img src="project4.jpg" alt="">
            </div>
        </a>
    </main>

</body>
</html>
