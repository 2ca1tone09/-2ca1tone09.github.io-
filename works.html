<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 【設定：ページタイトル】 ブラウザのタブに表示されるブランド名とページ名 -->
    <title>WORKS | scaL_TONE</title>
    
    <!-- 【設定：外部フォントの読み込み】 
         ブランドの標準フォントであるモダンな「Arimo」と、技術的・構築的な雰囲気を持つ等幅の「Azeret Mono」を採用 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&family=Azeret+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 【設定：デザインシステム共通変数（CSS Variables）】
           サイト全体で統一された色調、フォント、アニメーションの速度を一元管理します */
        :root {
            --bg-color: #ffffff;             /* 背景色：清潔感のあるピュアホワイト */
            --text-primary: #111111;         /* 主要文字：コントラストの強いディープブラック */
            --text-secondary: #555555;       /* 補助文字：可読性の高いミディアムグレー */
            --text-muted: #888888;           /* 控えめな文字：補足やメタデータ用のライトグレー */
            --accent-color: #eaeaea;         /* アクセント色：サイドバー背景などに使用するマットライトグレー */
            --border-color: #111111;         /* 境界線：強弱を明確にするためのシャープな黒線 */
            --font-sans: 'Arimo', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; /* サンセリフフォント */
            --font-mono: 'Azeret Mono', monospace; /* 等幅フォント */
            --transition-smooth: 0.6s cubic-bezier(0.25, 1, 0.5, 1); /* 贅沢で吸い付くようなイージング（0.6秒） */
        }

        /* 【設定：グローバルリセット】
           ブラウザ間の余白やボックス解釈の差異を排除し、ミリ単位のグリッド設計を正確に再現 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /* 【設定：全体ボディ（BODY）】
           ページ全体のベースラインを設定。フッターを最下部に押し出すためflexレイアウトを適用 */
        body { 
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            font-family: var(--font-sans); 
            padding: 40px 20px 100px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
            /* 起動時およびページロード時の透明度と位置の初期設定（0.6秒かけて滑らかにフェードイン） */
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        
        /* 【設定：ページフェードアウトクラス】
           リンククリック時にこのクラスがボディに付与され、project1同様に美しく消えていく遷移を実現します */
        body.page-fade-out {
            opacity: 0 !important;
            transform: translateY(-8px);
        }
        
        /* 【設定：極上レスポンシブ固定（追従）メニューボタン】
           スクロールしても左上に追従。
           画面最大幅1200pxの左端にピタリとシンクロし、スマホ等では端から20pxの美しい位置をキープ。 */
        .menu-trigger {
            position: fixed;
            top: 40px;
            left: max(20px, calc(50% - 600px));
            background: none;
            border: none;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1100; /* スライドインするサイドバーよりも常に手前に表示させて操作性を担保 */
            outline: none;
            -webkit-tap-highlight-color: transparent; /* モバイル端末でのタップ時ハイライト青枠を消去 */
        }

        /* 【設定：メニューボタン内の画像パーツ制御】
           三本線バー（menu1.png）とテトラポット（menu2.png）の2つの画像を重ねて配置 */
        .menu-trigger img {
            position: absolute;
            width: 26px;
            height: auto;
            object-fit: contain;
            transition: transform var(--transition-smooth), opacity var(--transition-smooth);
        }

        /* 【設定：初期状態（通常時）】
           menu1.png（三本線）が完全表示され、menu2.png（テトラポット）は反時計回りに回転して隠れた状態 */
        .menu-trigger .icon-default {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        .menu-trigger .icon-active {
            opacity: 0;
            transform: rotate(-180deg) scale(0.7);
        }

        /* 【設定：アクティブ（サイドバー展開時）状態】
           menu1.pngが時計回りにスピンしながら消去され、入れ替わりでテトラポット（menu2.png）がスピン登場 */
        .menu-trigger.active .icon-default {
            opacity: 0;
            transform: rotate(180deg) scale(0.7);
        }

        .menu-trigger.active .icon-active {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        /* 【設定：15〜20%の割合を占めるスライドイン・サイドバー（MENU-02.pngの完全再現）】
           初期状態は画面の左外側（-260px）に隠蔽され、クラス付与で滑らかに出現 */
        .sidebar-menu {
            position: fixed;
            top: 0;
            left: -260px; 
            width: 240px;
            height: 100vh;
            background-color: var(--accent-color); /* カンプ通りのマットなライトグレー */
            z-index: 1000;
            padding: 120px 30px 40px; /* 上部にテトラポットボタンの余白を贅沢に確保 */
            display: flex;
            flex-direction: column;
            gap: 28px;
            transition: left var(--transition-smooth);
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.02); /* 境界を感じさせない極小のソフトな陰影 */
        }

        /* 【設定：サイドバー開閉のトグル状態】 */
        .sidebar-menu.open {
            left: 0; /* 滑らかに画面内にスライドイン */
        }

        /* 【設定：サイドバー最上部のブランドマーク】
           menu2.png（テトラポットシンボル）を左寄せで美しく静置 */
        .sidebar-logo {
            margin-bottom: 12px;
            display: flex;
            justify-content: flex-start;
        }

        .sidebar-logo img {
            width: 32px;
            height: auto;
            object-fit: contain;
        }

        /* 【設定：サイドバー内のリンク構造】 */
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 6px 0;
            position: relative;
        }

        /* 【設定：サイドバーアイコンを包むラッパーコンテナ】
           アイコンサイズに左右されず、文字の開始位置を完璧に「縦一列」に揃えるための24px固定領域 */
        .sidebar-icon-wrapper {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* 【設定：各サイドバーアイコン（画像読み込み）の基本サイズ】 */
        .sidebar-icon {
            max-width: 16px;
            max-height: 16px;
            width: 100%;
            height: auto;
            object-fit: contain;
            opacity: 0.9;
            transition: transform 0.4s ease;
        }

        /* 【設定：ホバーインタラクション】 ホバーしたアイコンがわずかに膨らみ、鼓動のような有機性を演出 */
        .sidebar-item:hover .sidebar-icon {
            transform: scale(1.1);
        }

        /* 【設定：特注HOMEアイコン補正】 
           お預かりしている画像アセットのバランスを活かし、HOMEのみアイコンラッパー内の最大サイズを22pxに拡張 */
        .sidebar-item.home-link .sidebar-icon {
            max-width: 22px;
            max-height: 22px;
        }

        /* 【設定：完全に統一された長さと太さのアンダーバー】
           すべてのメニュー、すべての状態（通常時・ホバー時・アクティブ時）において、
           線の長さ（30px）と太さ（1px）をミリ単位で完全に均一に統一。ミニマルなグリッドの規律を強調 */
        .sidebar-item::after {
            content: '';
            position: absolute;
            left: 36px; /* wrapper(24px) + margin(12px) の位置に完璧に固定 */
            bottom: 0;
            width: 30px; /* 完全に統一された固定長 */
            height: 1px; /* 完全に統一された極細ライン */
            background-color: var(--text-primary);
            opacity: 0; /* 通常時は静寂を保つために非表示 */
            transition: opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* ホバー時に同じ長さ・太さのまま美しくフェードイン */
        .sidebar-item:hover::after, 
        .sidebar-item.active-link::after {
            opacity: 1;
        }

        /* 【設定：メニュー背景のソフトな暗幕】
           サイドバーが開いた際、メインコンテンツの背後に広がる白ベースのシースルーレイヤー。
           背後のコンテンツを薄く残しつつフォーカスをメニューに集中させます */
        .menu-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(2px); /* 現代的なすりガラス効果 */
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-smooth);
        }

        .menu-backdrop.show {
            opacity: 1;
            pointer-events: auto; /* 暗幕エリアをタップしてメニューを閉じることを可能にします */
        }

        /* 【設定：ヘッダー】 右上に現在地を表示し、左上のメニューと完璧な左右対比を構成 */
        header { 
            max-width: 1200px; 
            margin: 0 auto 60px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            width: 100%;
            z-index: 100;
        }

        /* 【設定：フィルターコンテナ】 
           等幅フォント「Azeret Mono」を採用。左上のメニューボタンの干渉を防ぐため十分な左余白を確保 */
        .filters-container {
            display: flex;
            gap: 20px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            margin-left: 60px; 
        }

        /* 【設定：フィルターボタン】 
           ミニマルなテキストリンク形式。アクティブまたはホバーで境界線が浮かび上がります */
        .filter-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            text-transform: uppercase;
            padding-bottom: 2px;
            border-bottom: 1px solid transparent;
            transition: color 0.3s ease, border-color 0.3s ease;
            outline: none;
        }

        .filter-btn.active, .filter-btn:hover {
            color: var(--text-primary);
            border-color: var(--border-color);
        }
        
        /* 【設定：現在地表示（ヘッダー右端）】
           10pxの極小フォントと極細ラインで現在地をさりげなく主張 */
        .current-page { 
            font-size: 10px; 
            letter-spacing: 0.2em; 
            font-weight: 700; 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 4px; 
            text-transform: uppercase;
            font-family: var(--font-mono);
        }

        /* 【設定：WORKSグリッド構造】
           12カラムのグリッド。JavaScriptの「非対称レイアウトエンジン」により、各アイテムが動的に不規則に配置されます */
        .works-grid { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 20px 0; 
            width: 100%;
            transition: transform var(--transition-smooth); /* メニュー展開時にコンテンツ全体がエレガントに右へシフト */
        }
        
        /* 【設定：個別作品枠】
           各アイテムの上部を1pxの黒細線で区切り、アートブックのような知的な緊張感を創出 */
        .work-item { 
            position: relative; 
            text-decoration: none; 
            display: block; 
            margin-bottom: 140px; 
            border-top: 1px solid var(--text-primary); 
            padding-top: 25px; 
            /* 初期状態：ロード時にフワッと浮き上がるアニメーション用の値 */
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 1.2s cubic-bezier(0.25, 1, 0.5, 1),
                        border-color 0.4s ease;
        }

        /* フェードインアニメーション適用時 */
        .work-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 【設定：フィルターアウト状態】
           非表示になったコンテンツが空間を崩さないよう、滑らかに縮小消去され、物理的な幅・高さをゼロにします */
        .work-item.filtered-out {
            opacity: 0 !important;
            transform: scale(0.95) translateY(10px) !important;
            pointer-events: none;
            position: absolute;
            width: 0;
            height: 0;
            overflow: hidden;
            margin: 0;
            padding: 0;
            border: none;
        }
        
        /* 【設定：作品番号・ラベル】 
           黒い区切り線の上にぴったりと重なるよう、ネガティブトランスフォームで垂直配置調整 */
        .work-label { 
            position: absolute;
            top: -1px; 
            transform: translateY(-100%); 
            display: block; 
            font-size: 10px; 
            letter-spacing: 0.15em; 
            color: var(--text-primary); 
            padding-bottom: 6px; 
            font-weight: 500; 
            text-transform: uppercase; 
            font-family: var(--font-mono);
        }
        
        /* 【設定：イメージマスクボックス】
           ホバー時の画像ズームがはみ出さないよう、外枠（マスク）として機能します */
        .image-box { 
            overflow: hidden; 
            background-color: #fafafa;
            position: relative;
        }
        
        /* 【設定：イメージ自体の表現】 
           通常時はノイズのないストイックなモノクロ（grayscale 100%）。ホバーにより極めて微細に拡大しながら色を取り戻します */
        .image-box img { 
            width: 100%; 
            height: auto; 
            display: block; 
            filter: grayscale(100%); 
            transition: filter 0.8s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 【設定：ホバー時の洗練された「＋」マーク演出】
           画像の上にカーソルを置くと、中央に極めてモダンなプラス記号が浮き上がります */
        .image-box::before {
            content: '+';
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: var(--font-mono);
            font-size: 18px;
            color: #ffffff;
            background-color: var(--text-primary);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 2;
            pointer-events: none;
        }
        
        /* ホバーおよびタップ（アクティブ）時のトランジション発火設定 */
        .work-item:hover img, 
        .work-item:active img { 
            filter: grayscale(0%); 
            transform: scale(1.03); 
        }

        .work-item:hover .image-box::before {
            opacity: 1;
            transform: scale(1);
        }

        .work-item:hover {
            border-color: var(--text-secondary);
        }
        
        /* 【設定：ポートフォリオ特注ブロック】
           最下部に配置される「縦長のポートフォリオPDF案内枠」。
           非対称性を完成させるために中央付近（3〜11カラム）を独占し、上下の余白を極限まで引き伸ばして設計。 */
        .portfolio-item {
            grid-column: 3 / 11 !important; 
            margin-top: 100px !important;
            margin-bottom: 20px !important;
            border-top: 1px solid var(--text-muted); 
        }

        .portfolio-item .work-label {
            color: var(--text-muted); 
        }
        
        /* 【設定：フッター】 常にページ全体の底に静置される、美的な終止符 */
        footer {
            margin-top: 60px;
            text-align: center;
            width: 100%;
        }

        /* 【設定：ホームへ戻るリンク】 
           等幅フォント「Azeret Mono」を採用。ホバーで静かにフェードアウトし、次の操作へと誘います */
        .back-link {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--text-primary);
            text-decoration: none;
            border-bottom: 1px solid var(--text-primary);
            padding-bottom: 4px;
            transition: opacity 0.3s ease;
            text-transform: uppercase;
            font-family: var(--font-mono);
            font-weight: 700;
        }
        
        .back-link:hover {
            opacity: 0.5;
        }
        
        /* 【設定：レスポンシブ補正（タブレット等の中解正）】 */
        @media (max-width: 1024px) {
            .filters-container {
                margin-left: 45px;
                gap: 12px;
            }
        }

        /* 【設定：レスポンシブ補正（スマートフォン等の小解像度）】
           PC特有の非対称なグリッド構造から、破綻のない美的な1カラム構造へと最適化させます */
        @media (max-width: 768px) { 
            header {
                flex-direction: column-reverse;
                align-items: flex-end;
                gap: 20px;
                margin-bottom: 40px;
            }
            .filters-container {
                margin-left: 0;
                width: 100%;
                justify-content: flex-start;
                overflow-x: auto; /* スマホ画面でフィルターボタン群がはみ出た際にスクロールで辿れるよう補正 */
                padding-bottom: 8px;
                scrollbar-width: none; /* スタイリッシュにスクロールバーを非表示（Firefox対応） */
            }
            .filters-container::-webkit-scrollbar {
                display: none; /* スタイリッシュにスクロールバーを非表示（Chrome / Safari対応） */
            }
            .works-grid { 
                display: flex;
                flex-direction: column;
                gap: 70px; /* スマートフォンで見やすい均一な縦の間隔に移行 */
            } 
            .work-item {
                width: 100% !important;
                margin-top: 0 !important;
                margin-bottom: 20px !important;
                transform: none !important; /* PC用の非対称オフセット（JavaScript側）をキャンセル */
                border-top: 1px solid #eeeeee;
            }
            .work-label {
                position: static;
                transform: none;
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- 【パーツ：メニュー開閉時のすりガラス暗幕レイヤー】 -->
    <div class="menu-backdrop" id="menu-backdrop"></div>

    <!-- 【パーツ：ヘッダー（フィルター群とメニューボタン、現在地）】 -->
    <header>
        <!-- 
            【パーツ：動的フィルターナビゲーション】
            `data-filter` 属性の値によって、JavaScriptが該当するカテゴリ以外を美しくフィルタアウトします。
        -->
        <div class="filters-container" id="filters-container">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="architecture">Architecture</button>
            <button class="filter-btn" data-filter="design">Design</button>
            <button class="filter-btn" data-filter="portfolio">Portfolio</button>
        </div>

        <!-- 
            【パーツ：極上レスポンシブ追従メニューボタン】
            `menu1.png` と `menu2.png` の相互スピン変化。
            エラー時には自動的に美的に補正された「M1」「M2」のプレースホルダーを描画します。
        -->
        <button class="menu-trigger" id="menu-trigger" aria-label="Menu">
            <img src="/assets/menu1.png" alt="Open Menu" class="menu-icon icon-default" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=M1';">
            <img src="/assets/menu2.png" alt="Close Menu" class="menu-icon icon-active" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=M2';">
        </button>

        <div class="current-page">WORKS</div>
    </header>

    <!-- 
        【パーツ：スライドイン・サイドバー（MENU-02.pngの完全模写）】
        すべてのサブページと1pxの狂いもなく揃えられた極細のアンダーライン（30px長）と、
        画像アセットを最大限に生かすためのプレースホルダー付き画像タグで構成されています。
    -->
    <aside class="sidebar-menu" id="sidebar-menu">
        <div class="sidebar-logo">
            <img src="/assets/menu2.png" alt="scaL_TONE Symbol" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=Y';">
        </div>
        <nav class="sidebar-nav">

    <!-- 【設定：JavaScriptエンジン（メニュー制御、ページフェード遷移、非対称レイアウト、動的フィルター）】 -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 要素の取得
            const trigger = document.getElementById('menu-trigger');
            const menu = document.getElementById('sidebar-menu');
            const backdrop = document.getElementById('menu-backdrop');
            const grid = document.getElementById('works-grid');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const allItems = Array.from(grid.querySelectorAll('.work-item'));

            // ------------------------------------------------------------
            // 【1. メニュー開閉・トグル処理】
            // メニュー展開時、グリッドコンテンツを少し右側へスライドさせることで完璧な対比空間を演出。
            // ------------------------------------------------------------
            function toggleMenu() {
                const isOpen = menu.classList.toggle('open');
                trigger.classList.toggle('active');
                backdrop.classList.toggle('show');

                if (isOpen) {
                    document.body.style.overflow = 'hidden'; // 背後の不用意なスクロールを完全に禁止
                    if (window.innerWidth > 768) {
                        grid.style.transform = 'translateX(60px)'; // 優雅な右方向へのシフト
                    }
                } else {
                    document.body.style.overflow = '';
                    grid.style.transform = 'translateX(0)'; // 元の位置に戻す
                }
            }

            // クリック時のバインド
            trigger.addEventListener('click', toggleMenu);
            backdrop.addEventListener('click', toggleMenu);

            // ------------------------------------------------------------
            // 【2. 完全に同期したページトランジションフェードアウト（600ms）】
            // サイドバー内のリンクや戻るリンク、作品画像をタップした際、
            // すぐにジャンプさせず、身体的な余韻を残すためのフェードアウトのあとに遷移します。
            // ------------------------------------------------------------
            const menuLinks = document.querySelectorAll('.sidebar-item, .back-link, .work-item');
            menuLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    const targetUrl = this.getAttribute('href');
                    if (targetUrl && targetUrl !== '#' && !targetUrl.startsWith('javascript:')) {
                        e.preventDefault(); // 通常の即時移動をキャンセル
                        
                        // サイドバーを閉じ、暗幕を解除して遷移準備
                        menu.classList.remove('open');
                        trigger.classList.remove('active');
                        backdrop.classList.remove('show');
                        grid.style.transform = 'translateX(0)';
                        
                        // project1.htmlと完全に同一の600msのアニメーション遅延の後に安全にジャンプ
                        document.body.classList.add('page-fade-out');
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 600); 
                    }
                });
            });

            // ------------------------------------------------------------
            // 【3. 動的・非対称レイアウトエンジン（Asymmetric Layout Engine）】
            // 黄金比率を元に、PCビューア時のみグリッドカラムの位置（左右スパン）と
            // ネガティブマージン（上方向のズレ）を不規則に割り当て、雑誌の美しいエディトリアルを自動構築。
            // ------------------------------------------------------------
            const layoutPatterns = [
                { gridColumn: '2 / 7', marginTop: '0px' },    /* パターンA：左寄せ */
                { gridColumn: '8 / 12', marginTop: '-60px' },  /* パターンB：右寄せ・上部に食い込み */
                { gridColumn: '4 / 10', marginTop: '70px' }    /* パターンC：中央・深い間隔 */
            ];

            function applyAsymmetricLayout() {
                // スマートフォン解像度以下の場合は非対称レイアウトを解除し、シンプルな流動1カラムに退避
                if (window.innerWidth <= 768) {
                    allItems.forEach(item => {
                        item.style.gridColumn = '';
                        item.style.marginTop = '';
                    });
                    return;
                }

                // フィルタによって現在「表示されている」アイテムのみに配列パターンを規則的に再適用
                const visibleItems = allItems.filter(item => !item.classList.contains('filtered-out'));
                visibleItems.forEach((item, index) => {
                    // ポートフォリオPDF枠だけは非対称にせず、中央に大きく表示させてグリッドを安定させます
                    if (item.classList.contains('portfolio-item')) {
                        item.style.gridColumn = '3 / 11';
                        item.style.marginTop = '100px';
                    } else {
                        const pattern = layoutPatterns[index % layoutPatterns.length];
                        item.style.gridColumn = pattern.gridColumn;
                        item.style.marginTop = pattern.marginTop;
                    }
                });
            }

            // ------------------------------------------------------------
            // 【4. カテゴリフィルタリング＆段階的（スタッガー）ロードアニメーション】
            // 選択されたカテゴリ以外を非表示化し、残ったアイテムに対して
            // 120ミリ秒のわずかな時間差を設けて下から順にフェードインするスタッガー現象を再現。
            // ------------------------------------------------------------
            filterBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    // フィルターボタンのアクティブクラスの付け替え
                    filterBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    const selectedFilter = this.getAttribute('data-filter');

                    allItems.forEach(item => {
                        const category = item.getAttribute('data-category');
                        if (selectedFilter === 'all' || category === selectedFilter) {
                            item.classList.remove('filtered-out'); // 表示
                        } else {
                            item.classList.add('filtered-out'); // 非表示
                        }
                    });

                    // レイアウトを再配置し、浮かび上がりアニメーションを再トリガー
                    applyAsymmetricLayout();
                    triggerStaggeredFadeIn();
                });
            });

            // 【5. 段階的フェードイン機能のトリガー】
            function triggerStaggeredFadeIn() {
                const visibleItems = allItems.filter(item => !item.classList.contains('filtered-out'));
                visibleItems.forEach(item => item.classList.remove('visible')); // 一旦リセット
                
                // 表示対象に対して120ミリ秒づつ遅延させて「visible」を付与
                visibleItems.forEach((item, index) => {
                    setTimeout(() => {
                        item.classList.add('visible');
                    }, index * 120);
                });
            }

            // ------------------------------------------------------------
            // 【6. 初期化およびウィンドウ幅監視】
            // ロード時の初期配置の確定と、リサイズ発生時のグリッド再描画をバインド。
            // ------------------------------------------------------------
            applyAsymmetricLayout();
            triggerStaggeredFadeIn();

            window.addEventListener('resize', applyAsymmetricLayout);
        });
    </script>
