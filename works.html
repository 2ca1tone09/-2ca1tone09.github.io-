<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 【設定：ページタイトル】 ブラウザのタブに表示されるブランド名とページ名 -->
    <title>WORKS | scaL_TONE</title>
    
    <!-- 【設定：外部フォントの読み込み】 
         ブランドの標準フォントであるモダンな「Arimo」と、技術的・構築的な雰囲気を持つ等幅の「Azeret Mono」を採用 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&family=Azeret+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 【設定：デザインシステム共通変数（CSS Variables）】
           サイト全体で統一された色調、フォント、アニメーションの速度を一元管理します */
        :root {
            --bg-color: #ffffff;             /* 背景色：清潔感のあるピュアホワイト */
            --text-primary: #111111;         /* 主要文字：コントラストの強いディープブラック */
            --text-secondary: #555555;       /* 補助文字：可読性の高いミディアムグレー */
            --text-muted: #888888;           /* 控えめな文字：補足やメタデータ用のライトグレー */
            --border-color: #111111;         /* 境界線：強弱を明確にするためのシャープな黒線 */
            --font-sans: 'Arimo', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; /* サンセリフフォント */
            --font-mono: 'Azeret Mono', monospace; /* 等幅フォント */
        }

        /* 【設定：グローバルリセット】
           ブラウザ間の余白やボックス解釈の差異を排除し、ミリ単位のグリッド設計を正確に再現 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        /* 【設定：全体ボディ（BODY）】
           project1と完璧に揃えた、600msの滑らかなフェードインアニメーション用初期設定 */
        body { 
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            font-family: var(--font-sans); 
            padding: 40px 20px 100px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
            opacity: 1;
            /* ページ起動時の透明度と位置の初期トランジション設定（project1準拠 0.6s） */
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        
        /* 【設定：ページフェードアウトクラス】
           project1同様、リンククリック時にこのクラスがボディに付与され、美しく消えていく遷移（0.6s）を実現します */
        body.page-fade-out {
            opacity: 0 !important;
            transform: translateY(-8px);
        }

        /* */
        /* 【標準仕様：極上レスポンシブ固定メニューボタン（project1と完全に同一）】
           スクロールしても左上に追従。画面最大幅1200pxの左端、またはスマホ端から20pxの位置。 */
        .menu-trigger {
            position: fixed;
            top: 40px;
            left: max(20px, calc(50% - 600px));
            background: none;
            border: none;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1100; /* スライドサイドバーより手前に表示 */
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 【標準仕様：メニュー画像パーツ制御（project1と完全に同一）】 */
        .menu-trigger img {
            position: absolute;
            width: 26px;
            height: auto;
            object-fit: contain;
            /* 0.6s イージング transition: project1の極上スピン指定を完全コピー */
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 【標準仕様：メニューボタン通常時（project1と完全に同一）】 */
        .menu-trigger .icon-default { 
            opacity: 1; 
            transform: rotate(0deg) scale(1); 
        }
        
        .menu-trigger .icon-active { 
            opacity: 0; 
            transform: rotate(-180deg) scale(0.7); 
        }

        /* 【標準仕様：メニューボタン展開アクティブ時（project1と完全に同一）】 */
        .menu-trigger.active .icon-default { 
            opacity: 0; 
            transform: rotate(180deg) scale(0.7); 
        }
        
        .menu-trigger.active .icon-active { 
            opacity: 1; 
            transform: rotate(0deg) scale(1); 
        }

        /* */
        /* 【標準仕様：15〜20%を占めるスライドインサイドバー（project1と完全に同一）】
           初期状態は画面外の左側（-260px）に隠蔽。マットなライトグレー（#eaeaea）。 */
        .sidebar-menu {
            position: fixed; 
            top: 0; 
            left: -260px; 
            width: 240px; 
            height: 100vh;
            background-color: #eaeaea; 
            z-index: 1000; 
            padding: 120px 30px 40px; /* テトラポットボタン用の余白 */
            /* 0.6s イージング transition: project1と完全同期 */
            transition: left 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; 
            flex-direction: column; 
            gap: 24px; /* project1基準のスリム隙間 */
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.02);
        }
        
        .sidebar-menu.open { 
            left: 0; 
        }

        /* 【標準仕様：サイドバー最上部のテトラポットロゴ（MENU-02.png再現）】 */
        .sidebar-logo {
            margin-bottom: 12px;
            display: flex;
            justify-content: flex-start;
        }

        .sidebar-logo img {
            width: 32px;
            height: auto;
            object-fit: contain;
        }
        
        /* 【標準仕様：サイドバーリンク構造（project1と完全に同一）】 */
        .sidebar-nav { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; /* project1基準の空間律動 */
        }
        
        .sidebar-item {
            display: flex; 
            align-items: center; 
            gap: 12px; 
            text-decoration: none;
            color: #111111; 
            font-size: 11px; 
            font-weight: 700; 
            letter-spacing: 0.15em;
            text-transform: uppercase; 
            padding: 6px 0; 
            position: relative;
        }
        
        /* 【標準仕様：サイドバーアイコン配置ラッパー（project1と完全に同一）】 */
        .sidebar-icon-wrapper { 
            width: 24px; 
            height: 24px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0; 
        }
        
        /* 【標準仕様：サイドバーアイコン本体（project1と完全に同一）】 */
        .sidebar-icon { 
            max-width: 16px; 
            max-height: 16px; 
            width: 100%; 
            height: auto; 
            object-fit: contain; 
            opacity: 0.9; 
        }
        
        /* 【標準仕様：サイドバーHOMEアイコン特注拡張（project1と完全に同一）】 */
        .sidebar-item.home-link .sidebar-icon { 
            max-width: 22px; 
            max-height: 22px; 
        }

        /* */
        /* 【標準仕様：完全に統一された長さと太さのアンダーバー（project1と完全に同一）】
           線の長さ（30px）、太さ（1px）、左位置（36px）を厳密に統一。 */
        .sidebar-item::after {
            content: ''; 
            position: absolute; 
            left: 36px; 
            bottom: 0; 
            width: 30px; 
            height: 1px;
            background-color: #111111; 
            opacity: 0; 
            /* 0.3s イージング transition: project1と完全一致 */
            transition: opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .sidebar-item:hover::after, 
        .sidebar-item.active-link::after { 
            opacity: 1; 
        }

        /* 【標準仕様：メニュー背景のソフトなすりガラス暗幕（project1と完全に同一）】 */
        .menu-backdrop {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            background-color: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(2px);
            z-index: 999; 
            opacity: 0; 
            pointer-events: none; 
            /* 0.6s トランジション: project1と完全一致 */
            transition: opacity 0.6s ease;
        }
        
        .menu-backdrop.show { 
            opacity: 1; 
            pointer-events: auto; 
        }

        /* */
        /* 【設定：ヘッダー】 右上に現在地を表示し、左上の追従メニューと完璧な左右対比を構成 */
        header { 
            max-width: 1200px; 
            margin: 0 auto 60px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            width: 100%;
            z-index: 100;
        }

        /* 【設定：フィルターコンテナ】 
           等幅フォント「Azeret Mono」を採用。左上のメニューボタンの干渉を防ぐため十分な左余白を確保 */
        .filters-container {
            display: flex;
            gap: 20px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            margin-left: 60px; 
        }

        /* 【設定：フィルターボタン】 
           ミニマルなテキストリンク形式。アクティブまたはホバーで境界線が浮かび上がります */
        .filter-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            text-transform: uppercase;
            padding-bottom: 2px;
            border-bottom: 1px solid transparent;
            transition: color 0.3s ease, border-color 0.3s ease;
            outline: none;
        }

        .filter-btn.active, .filter-btn:hover {
            color: var(--text-primary);
            border-color: var(--border-color);
        }
        
        /* 【設定：現在地表示（ヘッダー右端）】
           10pxの極小フォントと極細ラインで現在地をさりげなく主張 */
        .current-page { 
            font-size: 10px; 
            letter-spacing: 0.2em; 
            font-weight: 700; 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 4px; 
            text-transform: uppercase;
            font-family: var(--font-mono);
        }

        /* */
        /* 【設定：WORKSグリッド構造】
           12カラムのグリッド。JavaScriptの「非対称レイアウトエンジン」により、各アイテムが動的に不規則に配置されます */
        .works-grid { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 20px 0; 
            width: 100%;
            /* メニュー展開時のグリッドシフト用トランジション（0.6sイージング：project1準拠） */
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        /* 【設定：個別作品枠】
           各アイテムの上部を1pxの黒細線で区切り、アートブックのような知的な緊張感を創出 */
        .work-item { 
            position: relative; 
            text-decoration: none; 
            display: block; 
            margin-bottom: 140px; 
            border-top: 1px solid var(--text-primary); 
            padding-top: 25px; 
            /* 初期状態：ロード時にフワッと浮き上がるアニメーション用の値 */
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 1.2s cubic-bezier(0.25, 1, 0.5, 1),
                        border-color 0.4s ease;
        }

        /* フェードインアニメーション適用時 */
        .work-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 【設定：フィルターアウト状態】
           非表示になったコンテンツが空間を崩さないよう、物理的な幅・高さをゼロにします */
        .work-item.filtered-out {
            opacity: 0 !important;
            transform: scale(0.95) translateY(10px) !important;
            pointer-events: none;
            position: absolute;
            width: 0;
            height: 0;
            overflow: hidden;
            margin: 0;
            padding: 0;
            border: none;
        }
        
        /* 【設定：作品番号・ラベル】 
           黒い区切り線の上にぴったりと重なるよう、ネガティブトランスフォームで垂直配置調整 */
        .work-label { 
            position: absolute;
            top: -1px; 
            transform: translateY(-100%); 
            display: block; 
            font-size: 10px; 
            letter-spacing: 0.15em; 
            color: var(--text-primary); 
            padding-bottom: 6px; 
            font-weight: 500; 
            text-transform: uppercase; 
            font-family: var(--font-mono);
        }
        
        /* 【設定：イメージマスクボックス】
           ホバー時の画像ズームがはみ出さないよう、外枠（マスク）として機能します */
        .image-box { 
            overflow: hidden; 
            background-color: #fafafa;
            position: relative;
        }
        
        /* 【設定：イメージ自体の表現】 
           通常時はモノクロ。ホバーにより極めて微細に拡大しながら色を取り戻します */
        .image-box img { 
            width: 100%; 
            height: auto; 
            display: block; 
            filter: grayscale(100%); 
            transition: filter 0.8s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 【設定：ホバー時の洗練された「＋」マーク演出】 */
        .image-box::before {
            content: '+';
            position: absolute;
            top: 20px;
            right: 20px;
            font-family: var(--font-mono);
            font-size: 18px;
            color: #ffffff;
            background-color: var(--text-primary);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1), transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 2;
            pointer-events: none;
        }
        
        /* ホバーおよびタップ（アクティブ）時のトランジション発火設定 */
        .work-item:hover img, 
        .work-item:active img { 
            filter: grayscale(0%); 
            transform: scale(1.03); 
        }

        .work-item:hover .image-box::before {
            opacity: 1;
            transform: scale(1);
        }

        .work-item:hover {
            border-color: var(--text-secondary);
        }
        
        /* 【設定：ポートフォリオ特注ブロック】
           最下部に配置される「縦長のポートフォリオPDF案内枠」。
           非対称性を完成させるために中央付近（3〜11カラム）を独占し、上下の余白を極限まで引き伸ばして設計。 */
        .portfolio-item {
            grid-column: 3 / 11 !important; 
            margin-top: 100px !important;
            margin-bottom: 20px !important;
            border-top: 1px solid var(--text-muted); 
        }

        .portfolio-item .work-label {
            color: var(--text-muted); 
        }
        
        /* */
        /* 【設定：フッター】 常にページ全体の底に静置される、美的な終止符 */
        footer {
            margin-top: 60px;
            text-align: center;
            width: 100%;
        }

        /* 【設定：ホームへ戻るリンク】 
           等幅フォント「Azeret Mono」を採用。ホバーで静かにフェードアウト。
           project1基準に合わせて、当たり判定領域を上下左右に拡張し極上UXを担保。 */
        .back-link {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: var(--text-primary);
            text-decoration: none;
            border-bottom: 1px solid var(--text-primary);
            padding-bottom: 4px;
            transition: opacity 0.3s ease;
            text-transform: uppercase;
            font-family: var(--font-mono);
            font-weight: 700;
            position: relative;
        }

        .back-link::before {
            content: '';
            position: absolute;
            top: -15px;
            bottom: -15px;
            left: -25px;
            right: -25px;
        }
        
        .back-link:hover {
            opacity: 0.5;
        }
        
        /* 【設定：レスポンシブ補正（タブレット等の中解像度）】 */
        @media (max-width: 1024px) {
            .filters-container {
                margin-left: 45px;
                gap: 12px;
            }
        }

        /* 【設定：レスポンシブ補正（スマートフォン等の小解像度）】
           PC特有の非対称なグリッド構造から、破綻のない美的な1カラム構造へと最適化させます */
        @media (max-width: 768px) { 
            header {
                flex-direction: column-reverse;
                align-items: flex-end;
                gap: 20px;
                margin-bottom: 40px;
            }
            .filters-container {
                margin-left: 0;
                width: 100%;
                justify-content: flex-start;
                overflow-x: auto; /* スマホ画面でフィルターボタン群がはみ出た際にスクロール可能に */
                padding-bottom: 8px;
                scrollbar-width: none; /* Firefoxスクロールバー非表示 */
            }
            .filters-container::-webkit-scrollbar {
                display: none; /* Chrome / Safariスクロールバー非表示 */
            }
            .works-grid { 
                display: flex;
                flex-direction: column;
                gap: 70px; /* スマートフォンで見やすい均一な縦の間隔に移行 */
            } 
            .work-item {
                width: 100% !important;
                margin-top: 0 !important;
                margin-bottom: 20px !important;
                transform: none !important; /* PC用の非対称オフセット（JavaScript側）をキャンセル */
                border-top: 1px solid #eeeeee;
            }
            .work-label {
                position: static;
                transform: none;
                margin-bottom: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- 【パーツ：メニュー開閉時のすりガラス暗幕レイヤー】 -->
    <div class="menu-backdrop" id="menu-backdrop"></div>

    <!-- 【パーツ：ヘッダー（フィルター群とメニューボタン、現在地）】 -->
    <header>
        <!-- 
            【パーツ：動的フィルターナビゲーション】
            `data-filter` 属性の値によって、JavaScriptが該当するカテゴリ以外を美しくフィルタアウトします。
        -->
        <div class="filters-container" id="filters-container">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="architecture">Architecture</button>
            <button class="filter-btn" data-filter="design">Design</button>
            <button class="filter-btn" data-filter="portfolio">Portfolio</button>
        </div>

        <!-- 
            【標準仕様：極上レスポンシブ追従メニューボタン（project1と完全に同一）】
            `menu1.png` と `menu2.png` の相互スピン変化。
            エラー時には自動的に美的に補正されたプレースホルダーを描画します。
        -->
        <button class="menu-trigger" id="menu-trigger" aria-label="Menu">
            <img src="./assets/menu1.png" alt="Open Menu" class="icon-default" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=M1';">
            <img src="./assets/menu2.png" alt="Close Menu" class="icon-active" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=M2';">
        </button>

        <div class="current-page">WORKS</div>
    </header>

    <!-- -->
    <!-- 
        【標準仕様：スライドイン・サイドバー（project1と完全に同一のマークアップ仕様）】
        すべてのサブページと1pxの狂いもなく揃えられた極細のアンダーライン（30px長）と、
        画像アセットを最大限に生かすためのプレースホルダー付き画像タグで構成されています。
    -->
    <aside class="sidebar-menu" id="sidebar-menu">
        <div class="sidebar-logo">
            <img src="./assets/menu2.png" alt="scaL_TONE Symbol" onerror="this.src='https://placehold.co/32x32/111111/ffffff?text=Y';">
        </div>
        <nav class="sidebar-nav">
            <!-- HOMEリンク（特注サイズ：22pxアイコン） -->
            <a href="index.html" class="sidebar-item home-link">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="./assets/logo3.png" onerror="this.src='https://placehold.co/22x22/111111/fbfaf6?text=H';" alt="">
                </div>
                HOME
            </a>
            <a href="about.html" class="sidebar-item">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="./assets/about2.png" onerror="this.src='https://placehold.co/16x16/111111/fbfaf6?text=A';" alt="">
                </div>
                ABOUT
            </a>
            <a href="shop.html" class="sidebar-item">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="./assets/shop2.png" onerror="this.src='https://placehold.co/16x16/111111/fbfaf6?text=S';" alt="">
                </div>
                SHOP
            </a>
            <a href="news.html" class="sidebar-item">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="./assets/news2.png" onerror="this.src='https://placehold.co/16x16/111111/fbfaf6?text=N';" alt="">
                </div>
                NEWS
            </a>
            <!-- WORKSリンク（現在のアクティブなページ、アクティブ線常時表示） -->
            <a href="works.html" class="sidebar-item active-link">
                <div class="sidebar-icon-wrapper">
                    <img class="sidebar-icon" src="./assets/work2.png" onerror="this.src='https://placehold.co/16x16/111111/fbfaf6?text=W';" alt="">
                </div>
                WORKS
            </a>

    <!-- 【標準仕様：JavaScriptエンジン（project1と完全に一貫させたメニュー・遷移挙動）】 -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 要素の取得
            const trigger = document.getElementById('menu-trigger');
            const menu = document.getElementById('sidebar-menu');
            const backdrop = document.getElementById('menu-backdrop');
            const grid = document.getElementById('works-grid');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const allItems = Array.from(grid.querySelectorAll('.work-item'));

            // ------------------------------------------------------------
            // 【1. メニュー開閉・トグル処理（標準仕様：project1と完全に同一）】
            // メニュー展開時、グリッドコンテンツを右側へスライド（translateX(60px)）させ、
            // 背後スクロールを禁止（overflow: hidden）します。
            // ------------------------------------------------------------
            function toggleMenu() {
                const isOpen = menu.classList.toggle('open');
                trigger.classList.toggle('active');
                backdrop.classList.toggle('show');

                if (isOpen) {
                    document.body.style.overflow = 'hidden'; // 背景スクロールを確実に禁止
                    if (window.innerWidth > 1024) { // project1基準のレスポンシブ幅（1024px）でシフトを適用
                        grid.style.transform = 'translateX(60px)'; // プレミアム右方向シフト
                    }
                } else {
                    document.body.style.overflow = '';
                    grid.style.transform = 'translateX(0)'; // シフト解除
                }
            }

            // クリックイベントの登録
            trigger.addEventListener('click', toggleMenu);
            backdrop.addEventListener('click', toggleMenu);

            // ------------------------------------------------------------
            // 【2. ページトランジションフェードアウト（標準仕様：project1と完全に同一の600ms）】
            // サイドバーリンク、戻るリンク、作品画像をタップした際、
            // 600ミリ秒のトランジションアニメーション（page-fade-out）を挟んでから安全に遷移します。
            // ------------------------------------------------------------
            const transitLinks = document.querySelectorAll('.sidebar-item, .back-link, .work-item');
            transitLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    const targetUrl = this.getAttribute('href');
                    if (targetUrl && targetUrl !== '#' && !targetUrl.startsWith('javascript:')) {
                        e.preventDefault(); // 通常の即時ジャンプをキャンセル
                        
                        // サイドバーを引っ込めて、暗幕をリセットし、シフトを戻します
                        menu.classList.remove('open');
                        trigger.classList.remove('active');
                        backdrop.classList.remove('show');
                        grid.style.transform = 'translateX(0)';
                        document.body.style.overflow = '';
                        
                        // project1基準：600ミリ秒のフェードアウト遅延の後に遷移
                        document.body.classList.add('page-fade-out');
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 600); 
                    }
                });
            });

            // ------------------------------------------------------------
            // 【3. 動的・非対称レイアウトエンジン（Asymmetric Grid Engine）】
            // 黄金比率を元に、PCビューア時のみグリッドカラムの位置（左右スパン）と
            // ネガティブマージン（上方向のズレ）を不規則に割り当て、雑誌の美しいエディトリアルを自動構築。
            // ------------------------------------------------------------
            const layoutPatterns = [
                { gridColumn: '2 / 7', marginTop: '0px' },    /* パターンA：左寄せ */
                { gridColumn: '8 / 12', marginTop: '-60px' },  /* パターンB：右寄せ・上部に食い込み */
                { gridColumn: '4 / 10', marginTop: '70px' }    /* パターンC：中央・深い間隔 */
            ];

            function applyAsymmetricLayout() {
                // スマートフォン解像度以下の場合は非対称レイアウトを解除し、シンプルな流動1カラムに退避
                if (window.innerWidth <= 768) {
                    allItems.forEach(item => {
                        item.style.gridColumn = '';
                        item.style.marginTop = '';
                    });
                    return;
                }

                // フィルタによって現在「表示されている」アイテムのみに配列パターンを規則的に再適用
                const visibleItems = allItems.filter(item => !item.classList.contains('filtered-out'));
                visibleItems.forEach((item, index) => {
                    // ポートフォリオPDF枠だけは非対称にせず、中央に大きく表示させてグリッドを安定させます
                    if (item.classList.contains('portfolio-item')) {
                        item.style.gridColumn = '3 / 11';
                        item.style.marginTop = '100px';
                    } else {
                        const pattern = layoutPatterns[index % layoutPatterns.length];
                        item.style.gridColumn = pattern.gridColumn;
                        item.style.marginTop = pattern.marginTop;
                    }
                });
            }

            // ------------------------------------------------------------
            // 【4. カテゴリフィルタリング＆段階的（スタッガー）ロードアニメーション】
            // 選択されたカテゴリ以外を非表示化し、残ったアイテムに対して
            // 120ミリ秒のわずかな時間差を設けて下から順にフェードインするスタッガー現象を再現。
            // ------------------------------------------------------------
            filterBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    // フィルターボタンのアクティブクラスの付け替え
                    filterBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    const selectedFilter = this.getAttribute('data-filter');

                    allItems.forEach(item => {
                        const category = item.getAttribute('data-category');
                        if (selectedFilter === 'all' || category === selectedFilter) {
                            item.classList.remove('filtered-out'); // 表示
                        } else {
                            item.classList.add('filtered-out'); // 非表示
                        }
                    });

                    // レイアウトを再配置し、浮かび上がりアニメーションを再トリガー
                    applyAsymmetricLayout();
                    triggerStaggeredFadeIn();
                });
            });

            // 【5. 段階的フェードイン機能のトリガー】
            function triggerStaggeredFadeIn() {
                const visibleItems = allItems.filter(item => !item.classList.contains('filtered-out'));
                visibleItems.forEach(item => item.classList.remove('visible')); // 一旦リセット
                
                // 表示対象に対して120ミリ秒づつ遅延させて「visible」を付与
                visibleItems.forEach((item, index) => {
                    setTimeout(() => {
                        item.classList.add('visible');
                    }, index * 120);
                });
            }

            // ------------------------------------------------------------
            // 【6. 初期化およびウィンドウ幅監視】
            // ロード時の初期配置の確定と、リサイズ発生時のグリッド再描画をバインド。
            // ------------------------------------------------------------
            applyAsymmetricLayout();
            triggerStaggeredFadeIn();

            window.addEventListener('resize', applyAsymmetricLayout);
        });
    </script>
