<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORKS | scaL_TONE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #ffffff;
            color: #111111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 40px 20px 100px; /* 下部に余白を追加 */
        }

        /* 右上のWORKS表示 */
        header {
            max-width: 1200px;
            margin: 0 auto 60px;
            display: flex;
            justify-content: flex-end;
        }

        .current-page {
            font-size: 10px;
            letter-spacing: 0.2em;
            font-weight: 700;
            color: #111;
            text-transform: uppercase;
            border-bottom: 1px solid #111; /* アンダーバー */
            padding-bottom: 4px;
        }

        /* ギャラリーのグリッド設定 */
        .works-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .work-item {
            position: relative;
            text-decoration: none;
            display: block;
            margin-bottom: 100px;
        }

        .work-label {
            display: block;
            font-size: 10px;
            letter-spacing: 0.15em;
            color: #111;
            margin-bottom: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .image-box {
            overflow: hidden;
            background-color: #f5f5f5;
        }

        .image-box img {
            width: 100%;
            height: auto;
            display: block;
            filter: grayscale(100%);
            transition: filter 0.5s ease, transform 0.5s ease;
        }

        .work-item:hover img, .work-item:active img {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        /* 非対称グリッド配置 */
        .item1 { grid-column: 1 / 7; }
        .item2 { grid-column: 8 / 12; margin-top: -40px; }
        .item3 { grid-column: 3 / 11; margin-top: 40px; }
        .item4 { grid-column: 1 / 6; }

        /* 最下部のBack to home */
        footer {
            margin-top: 100px;
            text-align: center;
        }

        .back-link {
            display: inline-block;
            font-size: 11px;
            letter-spacing: 0.15em;
            color: #111;
            text-decoration: none;
            border-bottom: 1px solid #111;
            padding-bottom: 4px;
            transition: opacity 0.3s ease;
            text-transform: uppercase;
        }

        .back-link:hover {
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .works-grid { display: block; }
            .work-item { margin-top: 0 !important; margin-bottom: 60px; }
            header { margin-bottom: 40px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="current-page">WORKS</div>
    </header>

    <main class="works-grid">
        <a href="project1.html" class="work-item item1">
            <span class="work-label">Project No.01</span>
            <div class="image-box">
                <img src="p1.png" alt="">
            </div>
        </a>

        <a href="project2.html" class="work-item item2">
            <span class="work-label">Creative Work 02</span>
            <div class="image-box">
                <img src="P2.jpg" alt="">
            </div>
        </a>

        <a href="project3.html" class="work-item item3">
            <span class="work-label">Design Study 03</span>
            <div class="image-box">
                <img src="p3.png" alt="">
            </div>
        </a>
    </main>

    <footer>
        <a href="index.html" class="back-link">Back to home</a>
    </footer>

</body>
</html>
