<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORKS | scaL_TONE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&family=Azeret+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fbfaf6;
            --text-primary: #111111;
            --text-secondary: #555555;
            --border-color: #111111;
            --font-sans: 'Arimo', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-mono: 'Azeret Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            font-family: var(--font-sans); 
            padding: 40px 20px 100px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            opacity: 1;
            transition: opacity 0.6s ease;
        }

        body.page-fade-out { opacity: 0; }

        /* メニューボタン・サイドバー仕様 */
        .menu-trigger {
            position: fixed;
            top: 40px;
            left: max(20px, calc(50% - 600px));
            background: none;
            border: none;
            cursor: pointer;
            width: 32px;
            height: 32px;
            z-index: 1100;
        }

        .menu-trigger img {
            position: absolute;
            width: 26px;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s;
        }

        .menu-trigger .icon-active { opacity: 0; transform: rotate(-180deg) scale(0.7); }
        .menu-trigger.active .icon-default { opacity: 0; transform: rotate(180deg) scale(0.7); }
        .menu-trigger.active .icon-active { opacity: 1; transform: rotate(0deg) scale(1); }

        .sidebar-menu {
            position: fixed; top: 0; left: -260px; width: 240px; height: 100vh;
            background-color: #eaeaea; z-index: 1000; padding: 120px 30px 40px;
            transition: left 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.02);
        }
        .sidebar-menu.open { left: 0; }

        .sidebar-nav { display: flex; flex-direction: column; gap: 20px; }
        .sidebar-item {
            display: flex; align-items: center; gap: 12px; text-decoration: none;
            color: #111111; font-size: 11px; font-weight: 700; letter-spacing: 0.15em;
            text-transform: uppercase; padding: 6px 0; position: relative;
        }

        .sidebar-icon-wrapper { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
        .sidebar-icon { max-width: 16px; height: auto; }
        .sidebar-item.home-link .sidebar-icon { max-width: 22px; }

        .sidebar-item::after {
            content: ''; position: absolute; left: 36px; bottom: 0; width: 30px; height: 1px;
            background-color: #111111; opacity: 0; transition: opacity 0.3s;
        }
        .sidebar-item:hover::after, .sidebar-item.active-link::after { opacity: 1; }

        .menu-backdrop {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(255, 255, 255, 0.6); backdrop-filter: blur(2px);
            z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.6s;
        }
        .menu-backdrop.show { opacity: 1; pointer-events: auto; }

        header { max-width: 1200px; margin: 0 auto 40px; display: flex; justify-content: flex-end; width: 100%; }
        .current-page { font-size: 10px; letter-spacing: 0.2em; font-weight: 700; border-bottom: 1px solid #111; padding-bottom: 4px; font-family: var(--font-mono); }

        .works-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 40px;
            max-width: 1000px;
            width: 100%;
            margin: 20px auto;
        }

        .work-card {
            grid-column: span 6;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .work-card:nth-child(2) { animation-delay: 0.2s; }
        .work-img { width: 100%; aspect-ratio: 4/3; background: #eee; overflow: hidden; }
        .work-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
        .work-card:hover img { transform: scale(1.05); }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="menu-backdrop" id="menu-backdrop"></div>

    <button class="menu-trigger" id="menu-trigger">
        <img src="./assets/menu1.png" alt="Open" class="icon-default">
        <img src="./assets/menu2.png" alt="Close" class="icon-active">
    </button>

    <aside class="sidebar-menu" id="sidebar-menu">
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-item home-link">
                <div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="./assets/logo3.png"></div>
                HOME
            </a>
            <a href="about.html" class="sidebar-item"><div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="./assets/about2.png"></div>ABOUT</a>
            <a href="shop.html" class="sidebar-item"><div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="./assets/shop2.png"></div>SHOP</a>
            <a href="news.html" class="sidebar-item"><div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="./assets/news2.png"></div>NEWS</a>
            <a href="works.html" class="sidebar-item active-link"><div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="./assets/work2.png"></div>WORKS</a>
            <a href="contact.html" class="sidebar-item"><div class="sidebar-icon-wrapper"><img class="sidebar-icon" src="./assets/contact2.png"></div>CONTACT</a>
        </nav>
    </aside>

    <header><div class="current-page">WORKS</div></header>

    <main class="works-grid">
        <div class="work-card" onclick="window.location.href='project1.html'">
            <div class="work-img"><img src="./assets/p1.png" alt="Project 1"></div>
        </div>
        <div class="work-card" onclick="window.location.href='project2.html'">
            <div class="work-img"><img src="./assets/p3.png" alt="Project 2"></div>
        </div>
    </main>

    <script>
        const trigger = document.getElementById('menu-trigger');
        const menu = document.getElementById('sidebar-menu');
        const backdrop = document.getElementById('menu-backdrop');

        trigger.addEventListener('click', () => {
            menu.classList.toggle('open');
            trigger.classList.toggle('active');
            backdrop.classList.toggle('show');
        });

        backdrop.addEventListener('click', () => {
            menu.classList.remove('open');
            trigger.classList.remove('active');
            backdrop.classList.remove('show');
        });
    </script>
</body>
</html>
